<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px; color: #0f172a; background: #f8fafc;
  display: flex; flex-direction: column; height: 100vh;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: #fff;
  border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
#bundle-select {
  font-size: 16px; font-weight: 700; color: #0f172a;
  border: 1px solid #cbd5e1; border-radius: 4px;
  background: #fff; padding: 4px 8px; margin-right: 8px;
}
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px; padding: 5px 8px;
  border: 1px solid #cbd5e1; border-radius: 4px; background: #fff;
}
.controls input { width: 200px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }
main { display: flex; flex: 1; min-height: 0; }
#graph {
  flex: 1 1 60%; background: #fff;
  border-right: 1px solid #e2e8f0; min-width: 0;
}
#detail { flex: 0 0 40%; overflow-y: auto; padding: 18px 22px; background: #fff; }
#detail-empty { text-align: center; margin-top: 40px; color: #64748b; }
.detail-header { margin-bottom: 12px; }
.detail-header h1 { font-size: 18px; margin: 4px 0 2px; font-weight: 600; }
.type-chip {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; color: #fff; background: #94a3b8;
  text-transform: uppercase; letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid; grid-template-columns: 90px 1fr;
  row-gap: 4px; column-gap: 12px; margin: 8px 0 12px; font-size: 13px;
}
dl.frontmatter dt { color: #64748b; font-weight: 500; }
dl.frontmatter dd { margin: 0; word-break: break-all; }
.tag {
  display: inline-block; background: #f1f5f9; border: 1px solid #e2e8f0;
  border-radius: 4px; padding: 1px 6px; font-size: 11px; margin: 1px 2px 1px 0;
}
a.external { color: #3b82f6; word-break: break-all; }
.markdown-body { font-size: 13px; line-height: 1.6; }
.markdown-body h1 { font-size: 16px; margin: 16px 0 8px; }
.markdown-body h2 { font-size: 14px; margin: 14px 0 6px; }
.markdown-body h3 { font-size: 13px; margin: 12px 0 4px; }
.markdown-body code { background: #f1f5f9; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
.markdown-body pre { background: #f1f5f9; padding: 10px; border-radius: 4px; overflow-x: auto; }
.markdown-body pre code { background: none; padding: 0; }
.markdown-body table { border-collapse: collapse; width: 100%; font-size: 12px; }
.markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 4px 8px; text-align: left; }
.markdown-body th { background: #f8fafc; }
.markdown-body blockquote { border-left: 3px solid #cbd5e1; margin: 0; padding: 4px 12px; color: #64748b; }
#detail-backlinks { margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 12px; }
#detail-backlinks h3 { font-size: 13px; margin: 0 0 6px; }
#backlinks-list { margin: 0; padding-left: 16px; }
#backlinks-list li { margin: 3px 0; }
#backlinks-list a { color: #3b82f6; cursor: pointer; text-decoration: none; }
#backlinks-list a:hover { text-decoration: underline; }
.dim { opacity: 0.15; }
</style>
</head>
<body>
<header>
  <div class="title">
    <select id="bundle-select"></select>
    <span class="muted">OKF Bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search…">
    <select id="filter-type"><option value="">All types</option></select>
    <select id="layout">
      <option value="cose">Force</option>
      <option value="concentric">Concentric</option>
      <option value="breadthfirst">Tree</option>
      <option value="circle">Circle</option>
      <option value="grid">Grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>
<main>
  <div id="graph"></div>
  <div id="detail">
    <div id="detail-empty"><p>Click a node to explore.</p></div>
    <div id="detail-content" hidden>
      <div class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </div>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <div id="detail-body" class="markdown-body"></div>
      <div id="detail-backlinks" hidden>
        <h3>Referenced by</h3>
        <ul id="backlinks-list"></ul>
      </div>
    </div>
  </div>
</main>

urce_id` | INTEGER | FK to [🥈 Traffic Sources (E-Commerce)](./traffic-sources-e-commerce.md) |\n| `country_id` | INTEGER | The primary geographical location assigned to the customer FK to [🥈 Countries (E-Commerce)](./countries-e-commerce.md) |\n\n## Joins\n\n- [Acquisition Traffic Source](./traffic-sources-e-commerce.md) — `acquisition_traffic_source_id = traffic_source_id`\n- [Countries](./countries-e-commerce.md) — `country_id = country_id`\n", "e-commerce/facebook-ads-insights": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Facebook Ads Insights\"\ndescription: \"Facebook Ads Account Insights. \"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/cbec554e-11b4-426b-a066-d32cab44ab66.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"connector\"]\ntimestamp: 2026-05-26T20:09:30.000Z\n---\n\n# Facebook Ads Insights\n\nFacebook Ads Account Insights. \nAd-level granularity.\n\n## Overview\n\n- **ID:** `cbec554e-11b4-426b-a066-d32cab44ab66`\n- **Status:** PUBLISHED\n- **Definition type:** CONNECTOR\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/cbec554e-11b4-426b-a066-d32cab44ab66.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `ad_id` | STRING | PK. The unique ID of the ad you're viewing in reporting. |\n| `date_start` | DATE | PK. The start date for your data. This is controlled by the date range you've selected for your reporting view. |\n| `date_stop` | DATE | PK. The end date for your data. This is controlled by the date range you've selected for your reporting view. |\n| `ad_name` | STRING | The name of the ad you're viewing in reporting. |\n| `adset_id` | STRING | The unique ID of the ad set you're viewing in reporting. An ad set is a group of ads that share the same budget, schedule, delivery optimization and targeting. |\n| `adset_name` | STRING | The name of the ad set you're viewing in reporting. An ad set is a group of ads that share the same budget, schedule, delivery optimization and targeting. |\n| `campaign_id` | STRING | The unique ID number of the ad campaign you're viewing in reporting. Your campaign contains ad sets and ads. |\n| `campaign_name` | STRING | The name of the ad campaign you're viewing in reporting. Your campaign contains ad sets and ads. |\n| `clicks` | FLOAT | The number of clicks on your ads. |\n| `conversions` | STRING | conversions |\n| `conversion_values` | STRING | conversion_values |\n| `cpc` | FLOAT | The average cost for each click (all). |\n| `cpm` | FLOAT | The average cost for 1,000 impressions. |\n| `cpp` | FLOAT | The average cost to reach 1,000 people. This metric is estimated. |\n| `ctr` | FLOAT | The percentage of times people saw your ad and performed a click (all). |\n| `frequency` | FLOAT | The average number of times each person saw your ad. This metric is estimated. |\n| `impressions` | FLOAT | The number of times your ads were on screen. |\n| `results` | STRING | The number of results you received out of all the views of your ads. |\n| `spend` | FLOAT | The estimated total amount of money you've spent on your campaign, ad set or ad during its schedule. This metric is estimated. |\n", "e-commerce/google-ads-ad-group-stats-bq": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Google Ads Ad Group Stats BQ\"\ndescription: \"Google Ads Ad Group Stats. \"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/9e9035ea-1ab3-44a6-a2a5-f1bf2744dc19.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"connector\"]\ntimestamp: 2026-05-26T20:09:19.000Z\n---\n\n# Google Ads Ad Group Stats BQ\n\nGoogle Ads Ad Group Stats. \nAd group granularity.\n\n## Overview\n\n- **ID:** `9e9035ea-1ab3-44a6-a2a5-f1bf2744dc19`\n- **Status:** PUBLISHED\n- **Definition type:** CONNECTOR\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/9e9035ea-1ab3-44a6-a2a5-f1bf2744dc19.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `ad_group_id` | STRING | PK. Ad Group ID |\n| `date` | STRING | PK. Date for time series data |\n| `ad_group_name` | STRING | Ad Group Name |\n| `ad_group_status` | STRING | Ad Group Status (ENABLED, PAUSED, REMOVED) |\n| `campaign_id` | STRING | Campaign ID |\n| `clicks` | FLOAT | Number of Clicks |\n| `cost_micros` | FLOAT | Cost in Micros |\n| `conversions` | FLOAT | Number of Conversions |\n| `ctr` | FLOAT | Click-Through Rate |\n| `average_cpc` | FLOAT | Average Cost Per Click |\n| `impressions` | FLOAT | Number of Impressions |\n| `conversion_rate` | FLOAT | Conversion Rate |\n| `cost_per_conversion` | FLOAT | Cost Per Conversion |\n| `conversions_value` | FLOAT | Total Conversion Value |\n| `all_conversions` | FLOAT | All Conversions |\n| `all_conversions_value` | FLOAT | All Conversions Value |\n| `cost_per_all_conversions` | FLOAT | Cost Per All Conversions |\n| `average_cpm` | FLOAT | Average CPM |\n| `average_cost` | FLOAT | Average Cost |\n", "e-commerce/growth-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥇 Growth (E-Commerce)\"\ndescription: \"Demo guide\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/b4f59656-d52e-4ae3-847e-c34c025956bf.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"sql\"]\ntimestamp: 2026-07-16T01:07:28.000Z\n---\n\n# 🥇 Growth (E-Commerce)\n\nDemo guide\n  \n  ▎ What it is. A gold-layer Data Mart built the OWOX way: a thin SQL base that pulls one row per web \n  ▎ session, enriched entirely through Joinable Data Marts — zero join SQL. Five governed marts are \n  ▎ attached: Traffic Sources, Countries, Customers, Orders, and Purchases (Purchases reached \n  ▎ transitively: session → order → line item).\n  ▎\n  ▎ Headline message. \"This is how you build a star-schema gold layer in OWOX without writing join SQL. \n  ▎ The base reads raw sessions; every other dimension and metric is composed by joining governed Data \n  ▎ Marts and picking an aggregation. OWOX rolls the 1-to-many order lines back up to the session grain \n  ▎ automatically — nothing fans out, and the join logic stays reusable instead of buried in one giant \n  ▎ query.\"\n  ▎\n  ▎ Demo cases it supports:\n  ▎ - Full funnel in one mart — traffic (source / medium / campaign, paid vs organic, channel grouping) → \n  ▎ session → conversion → order → revenue. Show conversion rate by channel.\n  ▎ - Acquisition & geo growth — revenue and conversions sliced by channel grouping and country/region; \n  ▎ spot the markets and channels driving growth.\n  ▎ - Customer quality — Platinum / Gold / Standard segments against revenue and conversion: is high-value\n  ▎  demand growing?\n  ▎ - Transitive-join showcase — Purchases joins through Orders (session → order → item): multi-hop joins \n  ▎ with SUM roll-up to the session grain.\n  ▎ - Governance — some upstream marts are marked hidden from reporting to keep the analyst's field picker\n  ▎  clean; show how you curate the catalog.\n  ▎ - Self-serve in Sheets — the same mart powers a live, refreshable Google Sheets report via the OWOX \n  ▎ extension.\n  ▎\n  ▎ Metrics (after the revenue push-down): sessions, conversion rate, orders, units, gross revenue, net \n  ▎ (Completed-only) revenue, gross profit, AOV — by date/month, channel, country, segment, device.\n  ▎\n  ▎ Presenter caveat: product/SKU/category breakdowns are intentionally out of scope here (session grain).\n  ▎  For item-level analysis, use a purchases-grain mart.\n\n## Overview\n\n- **ID:** `b4f59656-d52e-4ae3-847e-c34c025956bf`\n- **Status:** PUBLISHED\n- **Definition type:** SQL\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/b4f59656-d52e-4ae3-847e-c34c025956bf.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `date` | DATE | The calendar date when the session occurred. |\n| `session_id` | STRING | PK. Unique identifier for an individual web or app session. FK to [🥈 Orders (E-Commerce)](./orders-e-commerce.md) |\n| `visitor_id` | STRING | Unique identifier for the anonymous visitor or browser. |\n| `traffic_source_id` | INTEGER | Numeric identifier for the marketing channel or referral source that directed the user. FK to [🥈 Traffic Sources (E-Commerce)](./traffic-sources-e-commerce.md) |\n| `country_id` | INTEGER | Numeric identifier representing the geographic country of the visitor. FK to [🥈 Countries (E-Commerce)](./countries-e-commerce.md) |\n| `customer_id` | INTEGER | Unique identifier for a registered user, which is null for guest visitors. FK to [🥈 Customers (E-Commerce)](./customers-e-commerce.md) |\n| `device_category` | STRING | The type of hardware used by the visitor, such as mobile or desktop. |\n| `is_conversion` | BOOLEAN | Indicates whether the session resulted in a successful transaction or goal completion. |\n\n## Joins\n\n- [Countries](./countries-e-commerce.md) — `country_id = country_id`\n- [Traffic Sources](./traffic-sources-e-commerce.md) — `traffic_source_id = traffic_source_id`\n- [Customers](./customers-e-commerce.md) — `customer_id = customer_id`\n- [Orders](./orders-e-commerce.md) — `session_id = session_id`\n", "e-commerce/linkedin-ads-performance-insights": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Linkedin Ads Performance Insights\"\ndescription: \"Linkedin Ads Performance Insights with ad-level granularity.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/330c308c-157e-46eb-8ba9-2d741fc9f89b.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"connector\"]\ntimestamp: 2026-05-26T20:08:10.000Z\n---\n\n# Linkedin Ads Performance Insights\n\nLinkedin Ads Performance Insights with ad-level granularity.\n\n## Overview\n\n- **ID:** `330c308c-157e-46eb-8ba9-2d741fc9f89b`\n- **Status:** PUBLISHED\n- **Definition type:** CONNECTOR\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/330c308c-157e-46eb-8ba9-2d741fc9f89b.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `dateRangeStart` | DATE | PK. Start date of the report data point. Date is specified in UTC format (YYYY-MM-DD). |\n| `dateRangeEnd` | DATE | PK. End date of the report data point. Date is specified in UTC format (YYYY-MM-DD). |\n| `pivotValues` | STRING | PK. The value of the pivots for a specific record returned. For example, supplying pivots of CREATIVE and CONVERSION results in a list of records, one for each creative/conversion combination. The pivotValues contain serialized URNs for the specific creative and conversion for a record. To resolve these URNs to their corresponding entities, refer to LinkedIn Marketing API URN Resolution. |\n| `actionClicks` | FLOAT | The count of clicks on the action button of the Sponsored Messaging ad. |\n| `adUnitClicks` | FLOAT | The count of clicks on the ad unit displayed alongside the Sponsored Messaging ad. |\n| `cardClicks` | FLOAT | Non-demographic pivots only (i.e. not MEMBER_). The number of clicks for each card of a carousel ad. The first card click of the carousel ad results in an immediate cardClick and click, whereas scrolling to other cards and clicking will count as additional cardClick. |\n| `cardImpressions` | FLOAT | Non-demographic pivots only (i.e. not MEMBER_). The number of impressions shown for each card of a carousel ad. The first card of the carousel ad results in an immediate cardImpression and impression, whereas scrolling to other cards will count as additional cardImpressions. |\n| `clicks` | FLOAT | The count of chargeable clicks. Despite not charging for clicks for CPM campaigns, this field still represents those clicks for which we would otherwise charge advertisers based on objective (for example, clicks to view the landing page or company page). |\n| `comments` | FLOAT | The count of comments. Sponsored Content only. |\n| `costInUsd` | FLOAT | Cost in USD based on the pivot and timeGranularity. For example, this would be spend by campaign on a given day if the pivot is CAMPAIGN and timeGranularity is DAILY. Cost is not adjusted for over delivery when a member professional demographic pivot is specified in the request. |\n| `follows` | FLOAT | The count of follows. Sponsored Content and Follower ads only. |\n| `impressions` | FLOAT | This is the count of impressions for Sponsored Content and sends for Sponsored Messaging. |\n| `landingPageClicks` | FLOAT | The count of clicks which take the user to the creative landing page. |\n| `likes` | FLOAT | The count of likes. Sponsored Content only. |\n| `opens` | FLOAT | The count of opens of Sponsored Messaging ads. |\n| `reactions` | FLOAT | The count of positive reactions on Sponsored Content which can capture, like, interest, praise, and other responses. |\n| `sends` | FLOAT | The count of sends of Sponsored Messaging ads. |\n| `shares` | FLOAT | The count of shares. Sponsored Content only. |\n", "e-commerce/microsoft-ads-performance": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Microsoft Ads Performance\"\ndescription: \"OWOX data mart 'Microsoft Ads Performance'.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/a26d2865-cea5-4fe9-8cd8-a62e8e63f832.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"connector\"]\ntimestamp: 2026-05-26T20:07:10.000Z\n---\n\n# Microsoft Ads Performance\n\n## Overview\n\n- **ID:** `a26d2865-cea5-4fe9-8cd8-a62e8e63f832`\n- **Status:** PUBLISHED\n- **Definition type:** CONNECTOR\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/a26d2865-cea5-4fe9-8cd8-a62e8e63f832.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `AccountId` | STRING | PK. The Microsoft Advertising assigned identifier of an account. |\n| `CampaignId` | STRING | PK. The Microsoft Advertising assigned identifier of a campaign. |\n| `AdGroupId` | STRING | PK. The Microsoft Advertising assigned identifier of an ad group. |\n| `AdId` | STRING | PK. The Microsoft Advertising assigned identifier of an ad. |\n| `TimePeriod` | DATE | PK. The time period of each report row. |\n| `CurrencyCode` | STRING | PK. The account currency type. |\n| `AdDistribution` | STRING | PK. The network where you want your ads to show. |\n| `DeviceType` | STRING | PK. The type of device which showed ads. |\n| `DeviceOS` | STRING | PK. The operating system of the device reported in the DeviceType column. |\n| `Network` | STRING | PK. The entire Microsoft Advertising Network made up of Microsoft sites and select traffic, and only partner traffic. |\n| `TopVsOther` | STRING | PK. Indicates whether the ad impression appeared in a top position or elsewhere. |\n| `BidMatchType` | STRING | PK. The keyword bid match type. |\n| `DeliveredMatchType` | STRING | PK. The match type used to deliver an ad. |\n| `Language` | STRING | PK. The language of the publisher where the ad was shown. |\n| `CampaignType` | STRING | PK. The campaign type. |\n| `AccountName` | STRING | The account name. |\n| `CampaignName` | STRING | The campaign name. |\n| `AdTitle` | STRING | The ad title. |\n| `Impressions` | INTEGER | The number of times an ad has been displayed on search results pages. |\n| `Clicks` | INTEGER | Clicks are what you pay for. |\n| `Ctr` | FLOAT | The click-through rate (CTR) is the number of times an ad was clicked, divided by the number of times the ad was shown. |\n| `Spend` | FLOAT | The cost per click (CPC) summed for each click. |\n| `Conversions` | INTEGER | The number of conversions. |\n| `AdStatus` | STRING | The ad status. |\n| `CampaignStatus` | STRING | The campaign status. |\n| `FinalUrl` | STRING | The Final URL of the ad. |\n| `VideoViews` | INTEGER | The number of times the video was played and watched for at least two continuous seconds with more than 50% of the screen in view. |\n| `VideoCompletionRate` | INTEGER | The number of completed video views divided by the total number of impressions, multiplied by 100. |\n| `BusinessName` | STRING | Depending on your responsive ad's placement, your business's name may appear in your ad. |\n| `Revenue` | STRING | The revenue optionally reported by the advertiser as a result of conversions. |\n| `CostPerConversion` | FLOAT | The cost per conversion. |\n| `AdType` | STRING | The ad type. |\n| `AdGroupName` | STRING | The ad group name. |\n", "e-commerce/open-exchange-rates": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Open Exchange Rates\"\ndescription: \"OWOX data mart 'Open Exchange Rates'.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/2d064db4-a6f2-4539-ac89-7f20be662340.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"connector\"]\ntimestamp: 2026-07-20T07:00:43.000Z\n---\n\n# Open Exchange Rates\n\n## Overview\n\n- **ID:** `2d064db4-a6f2-4539-ac89-7f20be662340`\n- **Status:** PUBLISHED\n- **Definition type:** CONNECTOR\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/2d064db4-a6f2-4539-ac89-7f20be662340.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `date` | DATE | PK. Date of exchange rate |\n| `base` | STRING | PK. Base currency |\n| `currency` | STRING | PK. Target currency |\n| `rate` | FLOAT | Exchange rate |\n", "e-commerce/orders-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Orders (E-Commerce)\"\ndescription: \"This data mart contains transaction-level records for all completed and in-progress orders, enabling analysis of customer purchasing behavior, order timelines, and fulfillment status. Each row repr...\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/d565c4cb-5f68-480e-917d-c1709b59ae02.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-20T07:01:01.000Z\n---\n\n# 🥈 Orders (E-Commerce)\n\nThis data mart contains transaction-level records for all completed and in-progress orders, enabling analysis of customer purchasing behavior, order timelines, and fulfillment status. Each row represents a single order, linked to both a customer and a session, allowing you to track conversions and attribute purchases to user activity\n\n## Overview\n\n- **ID:** `d565c4cb-5f68-480e-917d-c1709b59ae02`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/d565c4cb-5f68-480e-917d-c1709b59ae02.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `session_id` | STRING | Unique identifier of the session where the order was placed FK to [🥈 Sessions (E-Commerce)](./sessions-e-commerce.md) |\n| `customer_id` | INTEGER | Unique identifier of the customer who placed the order FK to [🥈 Customers (E-Commerce)](./customers-e-commerce.md) |\n| `order_date` | DATE | The date when the transaction was completed |\n| `order_id` | STRING | PK. Unique identifier of the purchase transaction FK to [🥈 Purchases (E-Commerce)](./purchases-e-commerce.md) |\n| `status` | STRING | Current fulfillment state of the order (e.g., Completed) |\n\n## Joins\n\n- [Products](./products-e-commerce.md)\n- [Purchases](./purchases-e-commerce.md) — `order_id = order_id`\n- [Customers](./customers-e-commerce.md) — `customer_id = customer_id`\n- [Sessions](./sessions-e-commerce.md) — `session_id = session_id`\n", "e-commerce/pages-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Pages (E-Commerce)\"\ndescription: \"This dataset provides a comprehensive directory of all web pages within the e-commerce platform, categorized by their functional purpose. It is used to map specific URL paths to human-readable titl...\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/5a7b5950-330c-4833-add0-033097440fe7.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-06-05T09:13:22.000Z\n---\n\n# 🥈 Pages (E-Commerce)\n\nThis dataset provides a comprehensive directory of all web pages within the e-commerce platform, categorized by their functional purpose. It is used to map specific URL paths to human-readable titles and page types, such as Product, Category, or Checkout, to support website navigation and conversion analysis.\n\n## Overview\n\n- **ID:** `5a7b5950-330c-4833-add0-033097440fe7`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/5a7b5950-330c-4833-add0-033097440fe7.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `page_id` | INTEGER | Unique numerical identifier for each specific page on the website. FK to [🥈 Pageviews (E-Commerce)](./pageviews-e-commerce.md) |\n| `page_path` | STRING | The URL path of the page relative to the domain root. |\n| `page_title` | STRING | The human-readable name or display title of the web page. |\n| `page_type` | STRING | Functional category of the page, such as Product, Category, or Checkout. |\n\n## Joins\n\n- [Pageviews](./pageviews-e-commerce.md) — `page_id = page_id`\n", "e-commerce/pageviews-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Pageviews (E-Commerce)\"\ndescription: \"OWOX data mart '🥈 Pageviews (E-Commerce)'.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/ebcc639a-e474-418a-8f62-36e222c61e2e.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-05-26T20:00:22.000Z\n---\n\n# 🥈 Pageviews (E-Commerce)\n\n## Overview\n\n- **ID:** `ebcc639a-e474-418a-8f62-36e222c61e2e`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/ebcc639a-e474-418a-8f62-36e222c61e2e.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `date` | DATE | The calendar date when the pageview occurred. |\n| `session_id` | STRING | Unique identifier for a specific user browsing session. |\n| `visitor_id` | STRING | Unique identifier for an individual user or browser. |\n| `hit_number` | INTEGER | The sequential order of the pageview within a specific session. |\n| `page_id` | INTEGER | Unique identifier for the specific page viewed by the visitor. FK to [🥈 Pages (E-Commerce)](./pages-e-commerce.md) |\n| `hit_timestamp` | TIMESTAMP | The exact date and time when the pageview was recorded, in UTC. |\n\n## Joins\n\n- [Pages](./pages-e-commerce.md) — `page_id = page_id`\n", "e-commerce/product-category-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Product Category (E-Commerce)\"\ndescription: \"This Data Mart provides a comprehensive list of product categories, their management hierarchy, and financial performance targets. It is used to analyze category-level organizational structure and ...\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/f33bb078-1183-4951-8b8b-8010f7c91d3f.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-05-26T20:02:01.000Z\n---\n\n# 🥈 Product Category (E-Commerce)\n\nThis Data Mart provides a comprehensive list of product categories, their management hierarchy, and financial performance targets. It is used to analyze category-level organizational structure and monitor target profit margins across different business groups.\n\n## Overview\n\n- **ID:** `f33bb078-1183-4951-8b8b-8010f7c91d3f`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/f33bb078-1183-4951-8b8b-8010f7c91d3f.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `category_id` | INTEGER | Unique numerical identifier for each product category. |\n| `category_name` | STRING | The descriptive name of the product category used for reporting and classification. |\n| `category_manager` | STRING | Full name of the individual responsible for managing the specific product category. |\n| `target_margin` | FLOAT | The desired profit margin percentage set for the category. |\n| `category_group` | STRING | High-level classification used to group related categories together, such as hard or soft goods. |\n", "e-commerce/product-performance-with-sparklines": "---\ntype: \"OWOX Data Mart\"\ntitle: \"📊 Product Performance with sparklines\"\ndescription: \"OWOX data mart '📊 Product Performance with sparklines'.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/aba99dcb-f68c-4109-893b-5e795bc53255.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"sql\"]\ntimestamp: 2026-07-17T16:59:58.000Z\n---\n\n# 📊 Product Performance with sparklines\n\n## Overview\n\n- **ID:** `aba99dcb-f68c-4109-893b-5e795bc53255`\n- **Status:** PUBLISHED\n- **Definition type:** SQL\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/aba99dcb-f68c-4109-893b-5e795bc53255.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `Product` | STRING |  |\n| `Brand` | STRING |  |\n| `Category` | STRING |  |\n| `Views By Medium` | STRING |  |\n| `Views Last 30d` | INTEGER |  |\n| `Views Trend` | STRING |  |\n| `Adds to Cart Last 30d` | INTEGER |  |\n| `Adds To Cart Trend` | STRING |  |\n| `Purchases Last 30d` | INTEGER |  |\n| `Purchases Trend` | STRING |  |\n", "e-commerce/products-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Products (E-Commerce)\"\ndescription: \"This Data Mart provides a comprehensive catalog of e-commerce products, including pricing, cost structures, and website categorization. It is primarily used for analyzing product margins and managi...\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/f6b33805-84ed-4469-9f7d-438e99c48696.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-19T07:00:17.000Z\n---\n\n# 🥈 Products (E-Commerce)\n\nThis Data Mart provides a comprehensive catalog of e-commerce products, including pricing, cost structures, and website categorization. It is primarily used for analyzing product margins and managing web content mapping.\n\n## Overview\n\n- **ID:** `f6b33805-84ed-4469-9f7d-438e99c48696`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/f6b33805-84ed-4469-9f7d-438e99c48696.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `product_id` | INTEGER | PK. Unique identifier for a specific product in the catalog |\n| `product_name` | STRING | The full commercial name of the product |\n| `price` | FLOAT | The current selling price of a single unit of the product |\n| `cost` | FLOAT | The acquisition cost or production expense per unit of the product |\n| `sub_category` | STRING | The specific sub-classification of the product within its broader category. |\n| `category_id` | INTEGER | Unique identifier for the high-level category the product belongs to. FK to [🥈 Product Category (E-Commerce)](./product-category-e-commerce.md) |\n| `page_path` | STRING | The URL relative path for the product's detail page on the website. |\n| `page_id` | INTEGER | Unique identifier for the specific web page associated with the product. FK to [🥈 Pages (E-Commerce)](./pages-e-commerce.md) |\n\n## Joins\n\n- [Product Category](./product-category-e-commerce.md) — `category_id = category_id`\n- [Pages](./pages-e-commerce.md) — `page_id = page_id`\n", "e-commerce/purchases-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Purchases (E-Commerce)\"\ndescription: \"Describes typical Purchases Data Mart in e-commerce domain for demo puprposes.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/0212efac-2c7d-4bcb-aaf2-055229de4b75.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-19T16:01:49.000Z\n---\n\n# 🥈 Purchases (E-Commerce)\n\nDescribes typical Purchases Data Mart in e-commerce domain for demo puprposes.\n\nThis Data Mart acts as the foundational layer for understanding purchasing behavior and sales performance. By breaking down transactions into specific line items, it enables the business to move beyond simple revenue tracking and dive deep into SKU-level analytics. Whether you are analyzing sales trends by currency or evaluating the quantity of specific products sold, this data provides the necessary precision for informed decision-making.\n\nThe schema is built for flexibility and scalability, supporting multi-currency transactions and varying product quantities per order. It provides a clean, standardized output that allows analysts to quickly generate insights into which products drive growth and how pricing strategies impact customer purchasing habits at the point of sale.\n\n## Overview\n\n- **ID:** `0212efac-2c7d-4bcb-aaf2-055229de4b75`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/0212efac-2c7d-4bcb-aaf2-055229de4b75.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `purchase_id` | STRING | PK. A unique identifier for each individual item row within an order |\n| `order_id` | STRING | The unique identifier of the transaction. Used to join with the Orders Data Mart. FK to [🥈 Orders (E-Commerce)](./orders-e-commerce.md) |\n| `product_id` | INTEGER | The unique identifier of the purchased product FK to [🥈 Products (E-Commerce)](./products-e-commerce.md) |\n| `quantity` | INTEGER | The number of units of this specific product included in the purchase line |\n| `sale_price` | FLOAT | The price per unit at the moment of purchase |\n| `currency` | STRING | The currency used for the transaction (e.g., USD) |\n| `unit_cost` | FLOAT | The cost incurred by the business to acquire or produce a single unit of the product. |\n| `line_revenue` | FLOAT | Gross revenue for this order line = Item Sale Price × Quantity. Sum across lines for total gross revenue (all order statuses). |\n| `line_cost` | FLOAT | Cost of goods sold for this order line = Unit Cost × Quantity. Sum for total COGS. |\n| `line_net_revenue` | FLOAT | Revenue recognised only for Completed orders (Cancelled / Returned = 0). Sum for net  revenue. |\n| `line_net_profit` | FLOAT | Profit for Completed orders = (Item Sale Price − Unit Cost) × Quantity, else 0. Sum for  total net profit. |\n\n## Joins\n\n- [Orders](./orders-e-commerce.md) — `order_id = order_id`\n- [Products](./products-e-commerce.md) — `product_id = product_id`\n", "e-commerce/purchases-list": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Purchases List\"\ndescription: \"This dataset contains detailed transaction records at the line-item level, including product quantities, pricing, and profitability metrics. It is primarily used to analyze sales performance, calcu...\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/d57170ef-8de5-4475-bbfb-61b20a72b051.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-16T11:08:35.000Z\n---\n\n# Purchases List\n\nThis dataset contains detailed transaction records at the line-item level, including product quantities, pricing, and profitability metrics. It is primarily used to analyze sales performance, calculate margins, and track net revenue after adjustments.\n\n## Overview\n\n- **ID:** `d57170ef-8de5-4475-bbfb-61b20a72b051`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/d57170ef-8de5-4475-bbfb-61b20a72b051.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `purchase_id` | STRING | PK. Unique identifier for each individual item line within a transaction. |\n| `order_id` | STRING | Unique identifier for the overall customer order or transaction. |\n| `product_id` | INTEGER | Unique numeric identifier for the specific product purchased. |\n| `quantity` | INTEGER | The number of units of the product included in the purchase line. |\n| `sale_price` | FLOAT | The price at which a single unit of the product was sold. |\n| `currency` | STRING | The three-letter ISO code representing the currency used for the transaction. |\n| `unit_cost` | FLOAT | The cost to the business for a single unit of the product. |\n| `line_revenue` | FLOAT | Total gross revenue for the line item, calculated as quantity multiplied by sale price. |\n| `line_cost` | FLOAT | Total cost for the line item, calculated as quantity multiplied by unit cost. |\n| `line_net_revenue` | FLOAT | The revenue for the line item after accounting for returns or adjustments. |\n| `line_net_profit` | FLOAT | The total profit generated by the line item after subtracting costs from net revenue. |\n", "e-commerce/reddit-ads-insights": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥉Reddit Ads | Insights\"\ndescription: \"OWOX data mart '🥉Reddit Ads | Insights'.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/fddd81d3-c862-44a7-b0b4-fe3df28020e9.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"connector\"]\ntimestamp: 2026-05-19T15:45:40.000Z\n---\n\n# 🥉Reddit Ads | Insights\n\n## Overview\n\n- **ID:** `fddd81d3-c862-44a7-b0b4-fe3df28020e9`\n- **Status:** PUBLISHED\n- **Definition type:** CONNECTOR\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/fddd81d3-c862-44a7-b0b4-fe3df28020e9.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `ad_id` | STRING | PK. The ID of the ad. |\n| `date` | DATE | PK. The date for this metric. |\n| `clicks` | INTEGER | The number of clicks detected for this report period. |\n| `cpc` | FLOAT | The cost-per-click for this period. |\n| `post_id` | STRING | The unique identifier of the post. |\n| `spend` | INTEGER | The amount (in microcurrency) spent for this report period. |\n| `impressions` | INTEGER | The number of impressions served for this report period. |\n| `hour` | STRING | The hour for this metric in ISO-8601. |\n| `engaged_click` | INTEGER | The number of engaged clicks such as RSVPs. |\n| `ecpm` | FLOAT | The effective CPM for this period. |\n| `cpv` | FLOAT | [Broken] The cost-per-view for this period. |\n| `ctr` | FLOAT | The click-through-rate for this period. |\n| `reach` | INTEGER | The number of unique users who saw the ad. |\n| `frequency` | FLOAT | The average number of times each user saw the ad. |\n| `currency` | STRING | The currency of the account. |\n", "e-commerce/sessions-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Sessions (E-Commerce)\"\ndescription: \"This Data Mart provides a detailed log of individual e-commerce browsing sessions, including traffic sources, device types, and conversion outcomes. It is primarily used to analyze user behavior, m...\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/22a66e81-1ce3-4c0a-8ead-3a154df490ab.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-16T02:42:23.000Z\n---\n\n# 🥈 Sessions (E-Commerce)\n\nThis Data Mart provides a detailed log of individual e-commerce browsing sessions, including traffic sources, device types, and conversion outcomes. It is primarily used to analyze user behavior, marketing attribution, and website performance across different geographic regions.\n\n## Overview\n\n- **ID:** `22a66e81-1ce3-4c0a-8ead-3a154df490ab`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/22a66e81-1ce3-4c0a-8ead-3a154df490ab.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `date` | DATE | The specific date when the browsing session occurred FK to [🥈 Unified Ad Spend (E-Commerce)](./unified-ad-spend-e-commerce.md) |\n| `session_id` | STRING | PK. Unique identifier for an individual user session FK to [🥈 Orders (E-Commerce)](./orders-e-commerce.md) |\n| `customer_id` | INTEGER | Unique identifier of the customer associated with the session FK to [🥈 Customers (E-Commerce)](./customers-e-commerce.md) |\n| `device_category` | STRING | The type of hardware device used during the session (e.g., mobile, desktop) |\n| `conversion_seed` | FLOAT | A technical value used to simulate the probability of a transaction. |\n| `visitor_id` | STRING | Unique identifier for the anonymous or recognized visitor. FK to [🥈 Visitors (E-Commerce)](./visitors-e-commerce.md) |\n| `traffic_source_id` | INTEGER | Internal numeric identifier for the marketing traffic source. FK to [🥈 Traffic Sources (E-Commerce)](./traffic-sources-e-commerce.md) |\n| `country_id` | INTEGER | Numeric identifier representing the geographic country of the visitor. FK to [🥈 Countries (E-Commerce)](./countries-e-commerce.md) |\n| `is_conversion` | BOOLEAN | Indicates whether the session resulted in a successful transaction or goal completion. |\n| `source` | STRING | The origin of the traffic, such as Google, Facebook, or direct entry. FK to [🥈 Unified Ad Spend (E-Commerce)](./unified-ad-spend-e-commerce.md) |\n| `medium` | STRING | The high-level channel type of the traffic, such as organic or cost-per-click. FK to [🥈 Unified Ad Spend (E-Commerce)](./unified-ad-spend-e-commerce.md) |\n| `campaign` | STRING | The name of the specific marketing campaign that drove the session. |\n\n## Joins\n\n- [Visitors](./visitors-e-commerce.md) — `visitor_id = visitor_id`\n- [Traffic Sources](./traffic-sources-e-commerce.md) — `traffic_source_id = traffic_source_id`\n- [Countries](./countries-e-commerce.md) — `country_id = country_id`\n- [Pageviews](./pageviews-e-commerce.md) — `session_id = session_id`\n- [Customers](./customers-e-commerce.md) — `customer_id = customer_id`\n- [Orders](./orders-e-commerce.md) — `session_id = session_id`\n- [Unified Ad Spend](./unified-ad-spend-e-commerce.md) — `date = date`, `source = source`, `medium = medium`\n", "e-commerce/shopify-orders-2026": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Shopify Orders 2026\"\ndescription: \"OWOX data mart 'Shopify Orders 2026'.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/48537173-e031-4349-b42c-696a1dcd72e2.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"connector\"]\ntimestamp: 2026-07-20T10:01:07.000Z\n---\n\n# Shopify Orders 2026\n\n## Overview\n\n- **ID:** `48537173-e031-4349-b42c-696a1dcd72e2`\n- **Status:** PUBLISHED\n- **Definition type:** CONNECTOR\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/48537173-e031-4349-b42c-696a1dcd72e2.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `id` | STRING | PK. A globally-unique ID. |\n| `name` | STRING | The order name, generated by combining the order_number with the shop order prefix. |\n| `email` | STRING | The email address of the customer. |\n| `phone` | STRING | The phone number of the customer. |\n| `confirmed` | BOOLEAN | Whether the order is confirmed. |\n| `closed` | BOOLEAN | Whether the order is closed. |\n| `cancelledAt` | TIMESTAMP | The date and time when the order was cancelled. |\n| `cancelReason` | STRING | The reason for cancellation. |\n| `currencyCode` | STRING | The currency of the order. |\n| `subtotalPrice` | FLOAT | The subtotal price of the order. |\n| `totalPrice` | FLOAT | The total price of the order. |\n| `totalTax` | FLOAT | The total tax of the order. |\n| `totalShippingPrice` | FLOAT | The total shipping price. |\n| `totalDiscounts` | FLOAT | The total discounts applied. |\n| `discountCodes` | STRING | Discount codes applied to the order as JSON array (code, amount, type). |\n| `createdAt` | TIMESTAMP | The date and time when the order was created. |\n", "e-commerce/tiktok-ads-insights": "---\ntype: \"OWOX Data Mart\"\ntitle: \"TikTok Ads Insights\"\ndescription: \"TikTok Ad Insights with ad-level granularity.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/5d2d9ba9-46cb-40e3-8cd4-7571533c98eb.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"connector\"]\ntimestamp: 2026-05-26T20:09:01.000Z\n---\n\n# TikTok Ads Insights\n\nTikTok Ad Insights with ad-level granularity.\n\n## Overview\n\n- **ID:** `5d2d9ba9-46cb-40e3-8cd4-7571533c98eb`\n- **Status:** PUBLISHED\n- **Definition type:** CONNECTOR\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/5d2d9ba9-46cb-40e3-8cd4-7571533c98eb.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `ad_id` | STRING | PK. Ad ID |\n| `stat_time_day` | DATE | PK. Statistics Date |\n| `campaign_id` | STRING | Campaign ID |\n| `adgroup_id` | STRING | Ad Group ID |\n| `date_start` | DATE | Start Date |\n| `date_end` | DATE | End Date |\n| `clicks` | INTEGER | Clicks |\n| `impressions` | INTEGER | Impressions |\n| `cost` | FLOAT | Cost |\n| `ctr` | FLOAT | Click-Through Rate |\n| `conversion` | INTEGER | Conversions |\n| `cost_per_conversion` | FLOAT | Cost Per Conversion |\n| `conversion_rate` | FLOAT | Conversion Rate |\n| `reach` | INTEGER | Reach |\n| `engagement` | INTEGER | Engagement |\n| `video_views` | INTEGER | Video Views |\n| `video_watched_2s` | INTEGER | 2s Video Views |\n| `video_watched_6s` | INTEGER | 6s Video Views |\n| `spend` | FLOAT | Spend |\n| `video_completion` | INTEGER | Video Completion |\n", "e-commerce/traffic-sources-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Traffic Sources (E-Commerce)\"\ndescription: \"This Data Mart provides a comprehensive breakdown of website traffic origins, categorizing visitors by source, medium, and specific marketing campaigns. It is used to analyze the effectiveness of d...\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/61b3c045-b334-440d-9913-bf52bc622af4.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-16T14:08:48.000Z\n---\n\n# 🥈 Traffic Sources (E-Commerce)\n\nThis Data Mart provides a comprehensive breakdown of website traffic origins, categorizing visitors by source, medium, and specific marketing campaigns. It is used to analyze the effectiveness of different acquisition channels and distinguish between paid and organic traffic performance.\n\n## Overview\n\n- **ID:** `61b3c045-b334-440d-9913-bf52bc622af4`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/61b3c045-b334-440d-9913-bf52bc622af4.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `traffic_source_id` | INTEGER | Unique internal identifier for a specific combination of traffic source, medium, and campaign. |\n| `source` | STRING | The origin of the website traffic, such as a search engine, social network, or domain. |\n| `medium` | STRING | The high-level category of the traffic source, such as organic, cost-per-click, or referral. |\n| `campaign` | STRING | The specific marketing campaign name associated with the traffic. |\n| `is_paid` | BOOLEAN | Indicates whether the traffic was generated through a paid marketing channel. |\n| `channel_grouping` | STRING | The classification of traffic into broad categories like Paid Marketing, Direct, or Organic. |\n", "e-commerce/unified-ad-spend-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Unified Ad Spend (E-Commerce)\"\ndescription: \"This dataset provides a consolidated view of daily advertising expenditures and performance metrics across multiple marketing platforms. It allows users to analyze spend, clicks, and impressions at...\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/c36e7a4e-e6c0-49ca-99f2-d8440d475363.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"sql\"]\ntimestamp: 2026-07-20T07:00:37.000Z\n---\n\n# 🥈 Unified Ad Spend (E-Commerce)\n\nThis dataset provides a consolidated view of daily advertising expenditures and performance metrics across multiple marketing platforms. It allows users to analyze spend, clicks, and impressions at the campaign level to evaluate cross-channel marketing efficiency.\n\n## Overview\n\n- **ID:** `c36e7a4e-e6c0-49ca-99f2-d8440d475363`\n- **Status:** PUBLISHED\n- **Definition type:** SQL\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/c36e7a4e-e6c0-49ca-99f2-d8440d475363.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `date` | DATE | The calendar date when the advertising activity occurred. |\n| `source` | STRING | The name of the advertising platform or network where the traffic originated. |\n| `medium` | STRING | The marketing channel or payment model used, such as cost-per-click. |\n| `campaign` | STRING | The specific marketing campaign name associated with the ad spend. |\n| `spend` | FLOAT | The total cost of advertising incurred during the specified period. |\n| `clicks` | INTEGER | The total number of times users clicked on the advertisements. |\n| `impressions` | INTEGER | The total number of times the advertisements were displayed to users. |\n", "e-commerce/visitors-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Visitors (E-Commerce)\"\ndescription: \"This dataset provides a comprehensive overview of website visitor behavior and acquisition history at the individual visitor level. It tracks engagement metrics like total sessions and visit dates ...\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/13e040df-a062-4f38-803b-54a7e0b75a3e.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-17T14:28:27.000Z\n---\n\n# 🥈 Visitors (E-Commerce)\n\nThis dataset provides a comprehensive overview of website visitor behavior and acquisition history at the individual visitor level. It tracks engagement metrics like total sessions and visit dates alongside marketing attribution details to help analyze user retention and campaign effectiveness.\n\n## Overview\n\n- **ID:** `13e040df-a062-4f38-803b-54a7e0b75a3e`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/13e040df-a062-4f38-803b-54a7e0b75a3e.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `visitor_id` | STRING | PK. Unique identifier for the website visitor. |\n| `linked_customer_id` | INTEGER | Identifier of the registered customer account associated with this visitor, if applicable. |\n| `first_seen_date` | DATE | The date when the visitor first interacted with the website. |\n| `last_seen_date` | DATE | The date of the most recent recorded interaction from this visitor. |\n| `total_sessions` | INTEGER | Total number of distinct browsing sessions initiated by the visitor. |\n| `acquisition_source` | STRING | The specific platform or site that referred the visitor to the website. |\n| `acquisition_medium` | STRING | The high-level channel type used to acquire the visitor, such as organic or paid search. |\n| `acquisition_campaign` | STRING | The name of the marketing campaign that originally brought the visitor to the site. |\n| `cohort_month` | DATE | The month and year of the visitor's first visit, used for retention analysis. |\n| `visitor_segment` | STRING | Classification of the visitor based on their engagement behavior or frequency. |\n| `country_id` | INTEGER | Numeric identifier representing the country where the visitor is located. |\n", "e-commerce/x-ads-stats": "---\ntype: \"OWOX Data Mart\"\ntitle: \"X Ads Stats\"\ndescription: \"OWOX data mart 'X Ads Stats'.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/bb3c6227-3642-4cad-9195-201c795c4f86.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"connector\"]\ntimestamp: 2026-04-20T15:49:56.000Z\n---\n\n# X Ads Stats\n\n## Overview\n\n- **ID:** `bb3c6227-3642-4cad-9195-201c795c4f86`\n- **Status:** PUBLISHED\n- **Definition type:** CONNECTOR\n- **Storage:** BigQuery [Common] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/bb3c6227-3642-4cad-9195-201c795c4f86.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `id` | STRING | PK. The unique identifier for the stats record. |\n| `date` | STRING | PK. The date for which the statistics were collected. |\n| `placement` | STRING | PK. The placement type (ALL_ON_TWITTER or PUBLISHER_NETWORK). |\n| `impressions` | INTEGER | Number of impressions. |\n| `tweets_send` | INTEGER | Number of tweets sent. |\n| `likes` | INTEGER | Number of likes. |\n| `unfollows` | INTEGER | Number of unfollows. |\n| `retweets` | INTEGER | Number of retweets. |\n| `app_clicks` | INTEGER | Number of app clicks. |\n| `follows` | INTEGER | Number of follows. |\n| `qualified_impressions` | INTEGER | Number of qualified impressions. |\n| `billed_charge_local_micro` | INTEGER | Billed amount in micros. |\n", "saas/account": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Account\"\ndescription: \"One row per customer account (company). Firmographics, plan tier and health.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/d9c55dd4-84b1-474a-9262-038ec0fa1f30.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-20T16:43:05.000Z\n---\n\n# Account\n\nOne row per customer account (company). Firmographics, plan tier and health.\n\n## Overview\n\n- **ID:** `d9c55dd4-84b1-474a-9262-038ec0fa1f30`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [SaaS] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/d9c55dd4-84b1-474a-9262-038ec0fa1f30.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `account_id` | STRING | PK. Unique account identifier. |\n| `name` | STRING | Company/account name. |\n| `industry` | STRING | Industry vertical of the account. |\n| `employee_band` | STRING | Company-size bucket by headcount. |\n| `plan_tier` | STRING | Subscription plan tier. |\n| `mrr_band` | STRING | Monthly-recurring-revenue size bucket. |\n| `region` | STRING | Sales/geographic region. |\n| `acquisition_channel` | STRING | Marketing channel that sourced the account — blended-CAC join key. |\n| `signup_date` | DATE | Date the account first signed up. |\n| `csm_owner` | STRING | Customer success manager who owns the account. |\n| `health_score` | INTEGER | 0–100 product-health composite. |\n| `lifecycle_stage` | STRING | trial / active / at-risk / churned. |\n", "saas/storage/bigquery-saas": "", "saas/invoices": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Invoices\"\ndescription: \"One row per invoice. Billing, collections and dunning.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/393ca959-5c23-433f-8b07-b5490c5c2fb9.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-21T13:31:06.000Z\n---\n\n# Invoices\n\nOne row per invoice. Billing, collections and dunning.\n\n## Overview\n\n- **ID:** `393ca959-5c23-433f-8b07-b5490c5c2fb9`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [SaaS] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/393ca959-5c23-433f-8b07-b5490c5c2fb9.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `invoice_id` | STRING | PK. Unique invoice identifier. |\n| `account_id` | STRING | Account billed. FK to [Account](./account.md) |\n| `subscription_id` | STRING | Subscription being billed. FK to [Subscription](./subscription.md) |\n| `issued_at` | DATE | Date the invoice was issued. |\n| `period_start` | DATE | Start of the billing period. |\n| `period_end` | DATE | End of the billing period. |\n| `amount` | NUMERIC | Invoice amount before tax. |\n| `tax` | NUMERIC | Tax charged on the invoice. |\n| `status` | STRING | Payment status of the invoice. |\n| `currency` | STRING | Invoice currency, aligned to the account's region. |\n| `discount_amount` | NUMERIC | Discount applied to the invoice, if any. |\n| `credit_applied` | NUMERIC | Account credit applied to the invoice, if any. |\n| `dunning_stage` | STRING | Collections stage: none / retry_1 / retry_2 / final_notice / write_off. |\n| `paid_at` | DATE | Date the invoice was paid. |\n| `is_failed` | BOOLEAN | Failed payment — involuntary-churn signal. |\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [Subscription](./subscription.md) — `subscription_id = subscription_id`\n", "saas/marketing-spend": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Marketing Spend\"\ndescription: \"One row per channel × campaign × day of spend. CAC and payback attributed at the acquisition-channel cohort level, not per account.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/2853de85-d7f7-4d12-94b7-484f06747296.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-21T13:25:00.000Z\n---\n\n# Marketing Spend\n\nOne row per channel × campaign × day of spend. CAC and payback attributed at the acquisition-channel cohort level, not per account.\n\n## Overview\n\n- **ID:** `2853de85-d7f7-4d12-94b7-484f06747296`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [SaaS] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/2853de85-d7f7-4d12-94b7-484f06747296.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `spend_id` | STRING | PK. Unique identifier for each spend record. |\n| `spend_date` | DATE | Day the spend was incurred. |\n| `channel` | STRING | Acquisition channel the spend targeted — attributed to the cohort of accounts acquired through it, not to individual accounts. FK to [Account](./account.md) |\n| `campaign` | STRING | Campaign the spend belongs to. |\n| `cost` | NUMERIC | Money spent — the CAC numerator. |\n| `leads` | INTEGER | Leads generated by the spend. |\n| `signups` | INTEGER | Accounts created — CAC denominator. |\n\n## Joins\n\n- [Account](./account.md) — `channel = acquisition_channel`\n", "saas/plan": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Plan\"\ndescription: \"One row per sellable plan/price point. Fixed catalog of 4 tiers × 2 billing intervals.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/f7dfcbdd-b9a5-4dd1-ba7d-c2ae5c1837c2.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-21T13:36:33.000Z\n---\n\n# Plan\n\nOne row per sellable plan/price point. Fixed catalog of 4 tiers × 2 billing intervals.\n\n## Overview\n\n- **ID:** `f7dfcbdd-b9a5-4dd1-ba7d-c2ae5c1837c2`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [SaaS] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/f7dfcbdd-b9a5-4dd1-ba7d-c2ae5c1837c2.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `plan_id` | STRING | PK. Unique plan/price-point identifier. |\n| `plan_name` | STRING | Human-readable plan name (tier + billing interval). |\n| `tier` | STRING | Product tier: Starter / Pro / Business / Enterprise. |\n| `billing_interval` | STRING | Billing cadence: monthly / annual. |\n| `list_price` | NUMERIC | Published list price for this plan at this interval. |\n| `currency` | STRING | Currency of the list price. |\n| `is_active` | BOOLEAN | Whether the plan is currently sellable. |\n", "saas/subscription-events": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Subscription Events\"\ndescription: \"One row per subscription change. Reconstructs the MRR waterfall and NRR/GRR.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/7f6b2c12-d6e3-4813-b72b-d379645601e5.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-21T13:31:56.000Z\n---\n\n# Subscription Events\n\nOne row per subscription change. Reconstructs the MRR waterfall and NRR/GRR.\n\n## Overview\n\n- **ID:** `7f6b2c12-d6e3-4813-b72b-d379645601e5`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [SaaS] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/7f6b2c12-d6e3-4813-b72b-d379645601e5.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `event_id` | STRING | PK. Unique subscription-event identifier. |\n| `account_id` | STRING | Account the event belongs to. FK to [Account](./account.md) |\n| `subscription_id` | STRING | Subscription the event belongs to. FK to [Subscription](./subscription.md) |\n| `event_ts` | TIMESTAMP | When the subscription change occurred. |\n| `event_type` | STRING | MRR-movement type: new / expansion / contraction / reactivation / churn. |\n| `plan_from` | STRING | Plan before the change. |\n| `plan_to` | STRING | Plan after the change. |\n| `mrr_delta` | NUMERIC | Signed MRR change — the MRR-movement waterfall. |\n| `seats_delta` | INTEGER | Signed change in seat count. |\n| `mrr_after` | NUMERIC | Total MRR after the change. |\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [Subscription](./subscription.md) — `subscription_id = subscription_id`\n", "saas/subscription": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Subscription\"\ndescription: \"One row per subscription, current state. Links an account to its plan; carries MRR, seats and billing dates.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/f24a8aba-2075-4039-a300-6dc31d713b85.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-21T13:36:31.000Z\n---\n\n# Subscription\n\nOne row per subscription, current state. Links an account to its plan; carries MRR, seats and billing dates.\n\n## Overview\n\n- **ID:** `f24a8aba-2075-4039-a300-6dc31d713b85`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [SaaS] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/f24a8aba-2075-4039-a300-6dc31d713b85.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `subscription_id` | STRING | PK. Unique subscription identifier. |\n| `account_id` | STRING | Account that owns the subscription. FK to [Account](./account.md) |\n| `plan_id` | STRING | Plan the subscription is billed on. May differ from the account's current tier under grandfathered pricing or a negotiated discount. FK to [Plan](./plan.md) |\n| `status` | STRING | Subscription status: trialing / active / past_due / canceled. |\n| `seats_licensed` | INTEGER | Number of seats licensed on the subscription. |\n| `mrr` | NUMERIC | Monthly recurring revenue for the subscription. |\n| `currency` | STRING | Billing currency, aligned to the account's region. |\n| `billing_interval` | STRING | Billing cadence: monthly / annual. |\n| `started_at` | DATE | Date the subscription started. |\n| `current_period_start` | DATE | Start of the current billing period. |\n| `current_period_end` | DATE | End of the current billing period. |\n| `canceled_at` | DATE | Date the subscription was canceled, if it was. |\n| `discount_pct` | NUMERIC | Negotiated discount fraction applied to list price, if any. |\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [Plan](./plan.md) — `plan_id = plan_id`\n", "saas/support-tickets": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Support Tickets\"\ndescription: \"One row per support ticket — CSAT and churn-risk signal.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/2d17b79d-e958-4853-aa45-195d29804041.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-21T13:32:54.000Z\n---\n\n# Support Tickets\n\nOne row per support ticket — CSAT and churn-risk signal.\n\n## Overview\n\n- **ID:** `2d17b79d-e958-4853-aa45-195d29804041`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [SaaS] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/2d17b79d-e958-4853-aa45-195d29804041.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `ticket_id` | STRING | PK. Unique support-ticket identifier. |\n| `account_id` | STRING | Account that opened the ticket. FK to [Account](./account.md) |\n| `user_id` | STRING | User who opened the ticket, if attributable. FK to [User](./user.md) |\n| `opened_at` | TIMESTAMP | When the ticket was opened. |\n| `closed_at` | TIMESTAMP | When the ticket was closed. |\n| `priority` | STRING | Ticket priority level. |\n| `category` | STRING | Ticket topic/category. |\n| `csat_score` | INTEGER | Customer satisfaction rating for the ticket. |\n| `first_response_mins` | INTEGER | Minutes to first agent response. |\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [User](./user.md) — `user_id = user_id`\n", "saas/trials": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Trials\"\ndescription: \"One row per trial. Trial-to-paid conversion without discounting.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/fd4b3c2b-1c54-4fb4-9f8e-22d89122dc34.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-20T16:43:08.000Z\n---\n\n# Trials\n\nOne row per trial. Trial-to-paid conversion without discounting.\n\n## Overview\n\n- **ID:** `fd4b3c2b-1c54-4fb4-9f8e-22d89122dc34`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [SaaS] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/fd4b3c2b-1c54-4fb4-9f8e-22d89122dc34.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `trial_id` | STRING | PK. Unique trial identifier. |\n| `account_id` | STRING | Account running the trial. FK to [Account](./account.md) |\n| `started_at` | TIMESTAMP | When the trial began. |\n| `ends_at` | TIMESTAMP | Scheduled trial expiry. |\n| `converted_at` | TIMESTAMP | When the trial converted to a paid plan, if it did. |\n| `is_converted` | BOOLEAN | Trial-to-paid outcome flag. |\n| `trial_source` | STRING | Where the trial came from (self-serve, sales-assisted, PLG upsell). |\n| `requested_plan` | STRING | Plan tier the trial is evaluating. |\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n", "saas/usage-daily": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Usage (daily)\"\ndescription: \"One row per account × user × day of product usage. Engagement and activation.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/3f271fcb-c1f6-4cb2-8914-86b73fb55675.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-21T13:33:24.000Z\n---\n\n# Usage (daily)\n\nOne row per account × user × day of product usage. Engagement and activation.\n\n## Overview\n\n- **ID:** `3f271fcb-c1f6-4cb2-8914-86b73fb55675`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [SaaS] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/3f271fcb-c1f6-4cb2-8914-86b73fb55675.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `usage_id` | STRING | PK. Unique daily-usage record identifier. |\n| `account_id` | STRING | Account that generated the usage. FK to [Account](./account.md) |\n| `user_id` | STRING | User that generated the usage. FK to [User](./user.md) |\n| `usage_date` | DATE | Calendar day of the usage. |\n| `active_minutes` | INTEGER | Minutes the user was active in-product. |\n| `key_actions` | INTEGER | Count of high-value actions taken. |\n| `distinct_features_used` | INTEGER | Count of distinct product features touched that day — activation breadth. |\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [User](./user.md) — `user_id = user_id`\n", "saas/user": "---\ntype: \"OWOX Data Mart\"\ntitle: \"User\"\ndescription: \"One row per user seat within an account.\"\nresource: \"https://app.owox.com/api/external/http-data/data-marts/6c047c34-a01d-44b8-b294-1340685392e3.ndjson\"\ntags: [\"owox\", \"google_bigquery\", \"view\"]\ntimestamp: 2026-07-20T16:43:08.000Z\n---\n\n# User\n\nOne row per user seat within an account.\n\n## Overview\n\n- **ID:** `6c047c34-a01d-44b8-b294-1340685392e3`\n- **Status:** PUBLISHED\n- **Definition type:** VIEW\n- **Storage:** BigQuery [SaaS] (GOOGLE_BIGQUERY)\n- **Data endpoint:** `GET https://app.owox.com/api/external/http-data/data-marts/6c047c34-a01d-44b8-b294-1340685392e3.ndjson`\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `user_id` | STRING | PK. Unique user identifier. |\n| `account_id` | STRING | Owning account. FK to [Account](./account.md) |\n| `email` | STRING | User's email address. |\n| `role` | STRING | User's role within the account. |\n| `seat_type` | STRING | Type of seat assigned (e.g. full / viewer). |\n| `invited_at` | TIMESTAMP | When the user was invited. |\n| `last_active_at` | TIMESTAMP | Most recent activity timestamp. |\n| `is_active` | BOOLEAN | Whether the seat is currently active. |\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n"}, "types": ["CONNECTOR", "GOOGLE_BIGQUERY", "SQL", "VIEW"]};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleNames = bundle.bundles || [];
  let currentBundle = bundleNames[0] || "";

  const bundleSelect = document.getElementById("bundle-select");
  for (const name of bundleNames) {
    const opt = document.createElement("option");
    opt.value = name; opt.textContent = name;
    bundleSelect.appendChild(opt);
  }
  bundleSelect.value = currentBundle;
  document.title = currentBundle + " — OKF Viewer";

  const inBundle = (el) => el.data.bundle === currentBundle;

  const typeSelect = document.getElementById("filter-type");

  function populateTypeFilter() {
    typeSelect.innerHTML = '<option value="">All types</option>';
    const types = new Set(bundle.nodes.filter(inBundle).map((n) => n.data.type));
    for (const t of [...types].sort()) {
      const opt = document.createElement("option");
      opt.value = t; opt.textContent = t;
      typeSelect.appendChild(opt);
    }
  }
  populateTypeFilter();

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] = backlinks[target] || []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes.filter(inBundle), ...bundle.edges.filter(inBundle)],
    style: [
      { selector: "node", style: {
          "background-color": "data(color)", "label": "data(label)",
          "color": "#0f172a", "font-size": 11,
          "text-valign": "bottom", "text-margin-y": 4,
          "text-wrap": "wrap", "text-max-width": 120,
          "width": "data(size)", "height": "data(size)",
          "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: {
          "width": 1.5, "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle",
          "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: {
          "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  bundleSelect.addEventListener("change", (e) => {
    currentBundle = e.target.value;
    document.title = currentBundle + " — OKF Viewer";
    document.getElementById("search").value = "";
    clearSelection();
    cy.elements().remove();
    cy.add([...bundle.nodes.filter(inBundle), ...bundle.edges.filter(inBundle)]);
    cy.elements().removeClass("dim");
    populateTypeFilter();
    cy.layout({ name: document.getElementById("layout").value, animate: false, padding: 30 }).run();
    cy.fit(null, 30);
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });
  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30); clearSelection();
  });
  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((e) => {
      e.toggleClass("dim", e.source().hasClass("dim") || e.target().hasClass("dim"));
    });
  });
  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => n.toggleClass("dim", n.data("type") !== t));
    cy.edges().forEach((e) => {
      e.toggleClass("dim", e.source().hasClass("dim") || e.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail-content").hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type; chip.style.background = data.color;
    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource; a.textContent = data.resource;
      a.target = "_blank"; a.rel = "noopener"; a.className = "external";
      resourceEl.appendChild(a);
    } else { resourceEl.textContent = "—"; }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    for (const t of (data.tags || [])) {
      const span = document.createElement("span");
      span.className = "tag"; span.textContent = t; tagsEl.appendChild(span);
    }
    if (!data.tags || !data.tags.length) tagsEl.textContent = "—";

    document.getElementById("detail-body").innerHTML =
      marked.parse(bundle.bodies[conceptId] || "", { breaks: false, gfm: true });

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    blSection.hidden = !bl.length;
    for (const src of bl) {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.textContent = nodeIndex[src] ? nodeIndex[src].label : src;
      a.onclick = () => showDetail(src);
      li.appendChild(a); blList.appendChild(li);
    }
  }
})();
</script>
</body>
