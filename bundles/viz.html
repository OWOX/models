<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OKF Bundle Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px; color: #0f172a; background: #f8fafc;
  display: flex; flex-direction: column; height: 100vh;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: #fff;
  border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
}
.title strong { font-size: 16px; margin-right: 8px; }
#bundle-select {
  font-size: 16px; font-weight: 700; color: #0f172a;
  border: 1px solid #cbd5e1; border-radius: 4px;
  background: #fff; padding: 4px 8px; margin-right: 8px;
}
.muted { color: #64748b; font-size: 12px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  font-size: 13px; padding: 5px 8px;
  border: 1px solid #cbd5e1; border-radius: 4px; background: #fff;
}
.controls input { width: 200px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }
main { display: flex; flex: 1; min-height: 0; }
#graph {
  flex: 1 1 60%; background: #fff;
  border-right: 1px solid #e2e8f0; min-width: 0;
}
#detail { flex: 0 0 40%; overflow-y: auto; padding: 18px 22px; background: #fff; }
#detail-empty { text-align: center; margin-top: 40px; color: #64748b; }
.detail-header { margin-bottom: 12px; }
.detail-header h1 { font-size: 18px; margin: 4px 0 2px; font-weight: 600; }
.type-chip {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; color: #fff; background: #94a3b8;
  text-transform: uppercase; letter-spacing: 0.5px;
}
dl.frontmatter {
  display: grid; grid-template-columns: 90px 1fr;
  row-gap: 4px; column-gap: 12px; margin: 8px 0 12px; font-size: 13px;
}
dl.frontmatter dt { color: #64748b; font-weight: 500; }
dl.frontmatter dd { margin: 0; word-break: break-all; }
.tag {
  display: inline-block; background: #f1f5f9; border: 1px solid #e2e8f0;
  border-radius: 4px; padding: 1px 6px; font-size: 11px; margin: 1px 2px 1px 0;
}
a.external { color: #3b82f6; word-break: break-all; }
.markdown-body { font-size: 13px; line-height: 1.6; }
.markdown-body h1 { font-size: 16px; margin: 16px 0 8px; }
.markdown-body h2 { font-size: 14px; margin: 14px 0 6px; }
.markdown-body h3 { font-size: 13px; margin: 12px 0 4px; }
.markdown-body code { background: #f1f5f9; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
.markdown-body pre { background: #f1f5f9; padding: 10px; border-radius: 4px; overflow-x: auto; }
.markdown-body pre code { background: none; padding: 0; }
.markdown-body table { border-collapse: collapse; width: 100%; font-size: 12px; }
.markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 4px 8px; text-align: left; }
.markdown-body th { background: #f8fafc; }
.markdown-body blockquote { border-left: 3px solid #cbd5e1; margin: 0; padding: 4px 12px; color: #64748b; }
#detail-backlinks { margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 12px; }
#detail-backlinks h3 { font-size: 13px; margin: 0 0 6px; }
#backlinks-list { margin: 0; padding-left: 16px; }
#backlinks-list li { margin: 3px 0; }
#backlinks-list a { color: #3b82f6; cursor: pointer; text-decoration: none; }
#backlinks-list a:hover { text-decoration: underline; }
.dim { opacity: 0.15; }
</style>
</head>
<body>
<header>
  <div class="title">
    <select id="bundle-select"></select>
    <span class="muted">OKF Bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search…">
    <select id="filter-type"><option value="">All types</option></select>
    <select id="layout">
      <option value="cose">Force</option>
      <option value="concentric">Concentric</option>
      <option value="breadthfirst">Tree</option>
      <option value="circle">Circle</option>
      <option value="grid">Grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>
<main>
  <div id="graph"></div>
  <div id="detail">
    <div id="detail-empty"><p>Click a node to explore.</p></div>
    <div id="detail-content" hidden>
      <div class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </div>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <div id="detail-body" class="markdown-body"></div>
      <div id="detail-backlinks" hidden>
        <h3>Referenced by</h3>
        <ul id="backlinks-list"></ul>
      </div>
    </div>
  </div>
</main>

orming user-base segmentation for targeted marketing.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-16T01:07:29.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `customer_id` | INTEGER | PK. Unique identifier for an individual registered customer |\n| `customer_segment` | STRING | The classification of the customer based on their purchase history or value |\n| `registration_date` | DATE | The specific date when the customer account was created in the system |\n| `acquisition_traffic_source_id` | INTEGER | FK to [🥈 Traffic Sources (E-Commerce)](./traffic-sources-e-commerce.md) |\n| `country_id` | INTEGER | The primary geographical location assigned to the customer FK to [🥈 Countries (E-Commerce)](./countries-e-commerce.md) |\n\n## Joins\n\n- [Acquisition Traffic Source](./traffic-sources-e-commerce.md) — `acquisition_traffic_source_id = traffic_source_id`\n- [Countries](./countries-e-commerce.md) — `country_id = country_id`\n", "e-commerce/google-ads-ad-group-stats-bq": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Google Ads Ad Group Stats BQ\"\ndescription: |\n  Google Ads Ad Group Stats. \n  Ad group granularity.\ntags: [\"owox\"]\ntimestamp: 2026-05-26T20:09:19.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `ad_group_id` | STRING | PK. Ad Group ID |\n| `date` | STRING | PK. Date for time series data |\n| `ad_group_name` | STRING | Ad Group Name |\n| `ad_group_status` | STRING | Ad Group Status (ENABLED, PAUSED, REMOVED) |\n| `campaign_id` | STRING | Campaign ID |\n| `clicks` | FLOAT | Number of Clicks |\n| `cost_micros` | FLOAT | Cost in Micros |\n| `conversions` | FLOAT | Number of Conversions |\n| `ctr` | FLOAT | Click-Through Rate |\n| `average_cpc` | FLOAT | Average Cost Per Click |\n| `impressions` | FLOAT | Number of Impressions |\n| `conversion_rate` | FLOAT | Conversion Rate |\n| `cost_per_conversion` | FLOAT | Cost Per Conversion |\n| `conversions_value` | FLOAT | Total Conversion Value |\n| `all_conversions` | FLOAT | All Conversions |\n| `all_conversions_value` | FLOAT | All Conversions Value |\n| `cost_per_all_conversions` | FLOAT | Cost Per All Conversions |\n| `average_cpm` | FLOAT | Average CPM |\n| `average_cost` | FLOAT | Average Cost |\n", "e-commerce/linkedin-ads-performance-insights": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Linkedin Ads Performance Insights\"\ndescription: \"Linkedin Ads Performance Insights with ad-level granularity.\"\ntags: [\"owox\"]\ntimestamp: 2026-05-26T20:08:10.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `dateRangeStart` | DATE | PK. Start date of the report data point. Date is specified in UTC format (YYYY-MM-DD). |\n| `dateRangeEnd` | DATE | PK. End date of the report data point. Date is specified in UTC format (YYYY-MM-DD). |\n| `pivotValues` | STRING | PK. The value of the pivots for a specific record returned. For example, supplying pivots of CREATIVE and CONVERSION results in a list of records, one for each creative/conversion combination. The pivotValues contain serialized URNs for the specific creative and conversion for a record. To resolve these URNs to their corresponding entities, refer to LinkedIn Marketing API URN Resolution. |\n| `actionClicks` | FLOAT | The count of clicks on the action button of the Sponsored Messaging ad. |\n| `adUnitClicks` | FLOAT | The count of clicks on the ad unit displayed alongside the Sponsored Messaging ad. |\n| `cardClicks` | FLOAT | Non-demographic pivots only (i.e. not MEMBER_). The number of clicks for each card of a carousel ad. The first card click of the carousel ad results in an immediate cardClick and click, whereas scrolling to other cards and clicking will count as additional cardClick. |\n| `cardImpressions` | FLOAT | Non-demographic pivots only (i.e. not MEMBER_). The number of impressions shown for each card of a carousel ad. The first card of the carousel ad results in an immediate cardImpression and impression, whereas scrolling to other cards will count as additional cardImpressions. |\n| `clicks` | FLOAT | The count of chargeable clicks. Despite not charging for clicks for CPM campaigns, this field still represents those clicks for which we would otherwise charge advertisers based on objective (for example, clicks to view the landing page or company page). |\n| `comments` | FLOAT | The count of comments. Sponsored Content only. |\n| `costInUsd` | FLOAT | Cost in USD based on the pivot and timeGranularity. For example, this would be spend by campaign on a given day if the pivot is CAMPAIGN and timeGranularity is DAILY. Cost is not adjusted for over delivery when a member professional demographic pivot is specified in the request. |\n| `follows` | FLOAT | The count of follows. Sponsored Content and Follower ads only. |\n| `impressions` | FLOAT | This is the count of impressions for Sponsored Content and sends for Sponsored Messaging. |\n| `landingPageClicks` | FLOAT | The count of clicks which take the user to the creative landing page. |\n| `likes` | FLOAT | The count of likes. Sponsored Content only. |\n| `opens` | FLOAT | The count of opens of Sponsored Messaging ads. |\n| `reactions` | FLOAT | The count of positive reactions on Sponsored Content which can capture, like, interest, praise, and other responses. |\n| `sends` | FLOAT | The count of sends of Sponsored Messaging ads. |\n| `shares` | FLOAT | The count of shares. Sponsored Content only. |\n", "e-commerce/microsoft-ads-performance": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Microsoft Ads Performance\"\ndescription: \"OWOX data mart 'Microsoft Ads Performance'.\"\ntags: [\"owox\"]\ntimestamp: 2026-05-26T20:07:10.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `AccountId` | STRING | PK. The Microsoft Advertising assigned identifier of an account. |\n| `CampaignId` | STRING | PK. The Microsoft Advertising assigned identifier of a campaign. |\n| `AdGroupId` | STRING | PK. The Microsoft Advertising assigned identifier of an ad group. |\n| `AdId` | STRING | PK. The Microsoft Advertising assigned identifier of an ad. |\n| `TimePeriod` | DATE | PK. The time period of each report row. |\n| `CurrencyCode` | STRING | PK. The account currency type. |\n| `AdDistribution` | STRING | PK. The network where you want your ads to show. |\n| `DeviceType` | STRING | PK. The type of device which showed ads. |\n| `DeviceOS` | STRING | PK. The operating system of the device reported in the DeviceType column. |\n| `Network` | STRING | PK. The entire Microsoft Advertising Network made up of Microsoft sites and select traffic, and only partner traffic. |\n| `TopVsOther` | STRING | PK. Indicates whether the ad impression appeared in a top position or elsewhere. |\n| `BidMatchType` | STRING | PK. The keyword bid match type. |\n| `DeliveredMatchType` | STRING | PK. The match type used to deliver an ad. |\n| `Language` | STRING | PK. The language of the publisher where the ad was shown. |\n| `CampaignType` | STRING | PK. The campaign type. |\n| `AccountName` | STRING | The account name. |\n| `CampaignName` | STRING | The campaign name. |\n| `AdTitle` | STRING | The ad title. |\n| `Impressions` | INTEGER | The number of times an ad has been displayed on search results pages. |\n| `Clicks` | INTEGER | Clicks are what you pay for. |\n| `Ctr` | FLOAT | The click-through rate (CTR) is the number of times an ad was clicked, divided by the number of times the ad was shown. |\n| `Spend` | FLOAT | The cost per click (CPC) summed for each click. |\n| `Conversions` | INTEGER | The number of conversions. |\n| `AdStatus` | STRING | The ad status. |\n| `CampaignStatus` | STRING | The campaign status. |\n| `FinalUrl` | STRING | The Final URL of the ad. |\n| `VideoViews` | INTEGER | The number of times the video was played and watched for at least two continuous seconds with more than 50% of the screen in view. |\n| `VideoCompletionRate` | INTEGER | The number of completed video views divided by the total number of impressions, multiplied by 100. |\n| `BusinessName` | STRING | Depending on your responsive ad's placement, your business's name may appear in your ad. |\n| `Revenue` | STRING | The revenue optionally reported by the advertiser as a result of conversions. |\n| `CostPerConversion` | FLOAT | The cost per conversion. |\n| `AdType` | STRING | The ad type. |\n| `AdGroupName` | STRING | The ad group name. |\n", "e-commerce/open-exchange-rates": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Open Exchange Rates\"\ndescription: \"OWOX data mart 'Open Exchange Rates'.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-23T07:00:52.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `date` | DATE | PK. Date of exchange rate |\n| `base` | STRING | PK. Base currency |\n| `currency` | STRING | PK. Target currency |\n| `rate` | FLOAT | Exchange rate |\n", "e-commerce/orders-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Orders (E-Commerce)\"\ndescription: \"This data mart contains transaction-level records for all completed and in-progress orders, enabling analysis of customer purchasing behavior, order timelines, and fulfillment status. Each row represents a single order, linked to both a customer and a session, allowing you to track conversions and attribute purchases to user activity\"\ntags: [\"owox\"]\ntimestamp: 2026-07-23T07:01:13.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `session_id` | STRING | Unique identifier of the session where the order was placed FK to [🥈 Sessions (E-Commerce)](./sessions-e-commerce.md) |\n| `customer_id` | INTEGER | Unique identifier of the customer who placed the order FK to [🥈 Customers (E-Commerce)](./customers-e-commerce.md) |\n| `order_date` | DATE | The date when the transaction was completed |\n| `order_id` | STRING | PK. Unique identifier of the purchase transaction FK to [🥈 Purchases (E-Commerce)](./purchases-e-commerce.md) |\n| `status` | STRING | Current fulfillment state of the order (e.g., Completed) |\n\n## Joins\n\n- [Products](./products-e-commerce.md)\n- [Purchases](./purchases-e-commerce.md) — `order_id = order_id`\n- [Customers](./customers-e-commerce.md) — `customer_id = customer_id`\n- [Sessions](./sessions-e-commerce.md) — `session_id = session_id`\n", "e-commerce/pages-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Pages (E-Commerce)\"\ndescription: \"This dataset provides a comprehensive directory of all web pages within the e-commerce platform, categorized by their functional purpose. It is used to map specific URL paths to human-readable titles and page types, such as Product, Category, or Checkout, to support website navigation and conversion analysis.\"\ntags: [\"owox\"]\ntimestamp: 2026-06-05T09:13:22.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `page_id` | INTEGER | Unique numerical identifier for each specific page on the website. FK to [🥈 Pageviews (E-Commerce)](./pageviews-e-commerce.md) |\n| `page_path` | STRING | The URL path of the page relative to the domain root. |\n| `page_title` | STRING | The human-readable name or display title of the web page. |\n| `page_type` | STRING | Functional category of the page, such as Product, Category, or Checkout. |\n\n## Joins\n\n- [Pageviews](./pageviews-e-commerce.md) — `page_id = page_id`\n", "e-commerce/pageviews-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Pageviews (E-Commerce)\"\ndescription: \"OWOX data mart '🥈 Pageviews (E-Commerce)'.\"\ntags: [\"owox\"]\ntimestamp: 2026-05-26T20:00:22.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `date` | DATE | The calendar date when the pageview occurred. |\n| `session_id` | STRING | Unique identifier for a specific user browsing session. |\n| `visitor_id` | STRING | Unique identifier for an individual user or browser. |\n| `hit_number` | INTEGER | The sequential order of the pageview within a specific session. |\n| `page_id` | INTEGER | Unique identifier for the specific page viewed by the visitor. FK to [🥈 Pages (E-Commerce)](./pages-e-commerce.md) |\n| `hit_timestamp` | TIMESTAMP | The exact date and time when the pageview was recorded, in UTC. |\n\n## Joins\n\n- [Pages](./pages-e-commerce.md) — `page_id = page_id`\n", "e-commerce/product-category-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Product Category (E-Commerce)\"\ndescription: \"This Data Mart provides a comprehensive list of product categories, their management hierarchy, and financial performance targets. It is used to analyze category-level organizational structure and monitor target profit margins across different business groups.\"\ntags: [\"owox\"]\ntimestamp: 2026-05-26T20:02:01.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `category_id` | INTEGER | Unique numerical identifier for each product category. |\n| `category_name` | STRING | The descriptive name of the product category used for reporting and classification. |\n| `category_manager` | STRING | Full name of the individual responsible for managing the specific product category. |\n| `target_margin` | FLOAT | The desired profit margin percentage set for the category. |\n| `category_group` | STRING | High-level classification used to group related categories together, such as hard or soft goods. |\n", "e-commerce/product-performance-with-sparklines": "---\ntype: \"OWOX Data Mart\"\ntitle: \"📊 Product Performance with sparklines\"\ndescription: \"OWOX data mart '📊 Product Performance with sparklines'.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-21T01:39:36.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `Product` | STRING |  |\n| `Brand` | STRING |  |\n| `Category` | STRING |  |\n| `Views By Medium` | STRING |  |\n| `Views Last 30d` | INTEGER |  |\n| `Views Trend` | STRING |  |\n| `Adds to Cart Last 30d` | INTEGER |  |\n| `Adds To Cart Trend` | STRING |  |\n| `Purchases Last 30d` | INTEGER |  |\n| `Purchases Trend` | STRING |  |\n", "e-commerce/products-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Products (E-Commerce)\"\ndescription: \"This Data Mart provides a comprehensive catalog of e-commerce products, including pricing, cost structures, and website categorization. It is primarily used for analyzing product margins and managing web content mapping.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-23T07:00:34.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `product_id` | INTEGER | PK. Unique identifier for a specific product in the catalog |\n| `product_name` | STRING | The full commercial name of the product |\n| `price` | FLOAT | The current selling price of a single unit of the product |\n| `cost` | FLOAT | The acquisition cost or production expense per unit of the product |\n| `sub_category` | STRING | The specific sub-classification of the product within its broader category. |\n| `category_id` | INTEGER | Unique identifier for the high-level category the product belongs to. FK to [🥈 Product Category (E-Commerce)](./product-category-e-commerce.md) |\n| `page_path` | STRING | The URL relative path for the product's detail page on the website. |\n| `page_id` | INTEGER | Unique identifier for the specific web page associated with the product. FK to [🥈 Pages (E-Commerce)](./pages-e-commerce.md) |\n\n## Joins\n\n- [Product Category](./product-category-e-commerce.md) — `category_id = category_id`\n- [Pages](./pages-e-commerce.md) — `page_id = page_id`\n", "e-commerce/purchases-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Purchases (E-Commerce)\"\ndescription: |\n  Describes typical Purchases Data Mart in e-commerce domain for demo puprposes.\n\n  This Data Mart acts as the foundational layer for understanding purchasing behavior and sales performance. By breaking down transactions into specific line items, it enables the business to move beyond simple revenue tracking and dive deep into SKU-level analytics. Whether you are analyzing sales trends by currency or evaluating the quantity of specific products sold, this data provides the necessary precision for informed decision-making.\n\n  The schema is built for flexibility and scalability, supporting multi-currency transactions and varying product quantities per order. It provides a clean, standardized output that allows analysts to quickly generate insights into which products drive growth and how pricing strategies impact customer purchasing habits at the point of sale.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T16:01:54.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `purchase_id` | STRING | PK. A unique identifier for each individual item row within an order |\n| `order_id` | STRING | The unique identifier of the transaction. Used to join with the Orders Data Mart. FK to [🥈 Orders (E-Commerce)](./orders-e-commerce.md) |\n| `product_id` | INTEGER | The unique identifier of the purchased product FK to [🥈 Products (E-Commerce)](./products-e-commerce.md) |\n| `quantity` | INTEGER | The number of units of this specific product included in the purchase line |\n| `sale_price` | FLOAT | The price per unit at the moment of purchase |\n| `currency` | STRING | The currency used for the transaction (e.g., USD) |\n| `unit_cost` | FLOAT | The cost incurred by the business to acquire or produce a single unit of the product. |\n| `line_revenue` | FLOAT | Gross revenue for this order line = Item Sale Price × Quantity. Sum across lines for total gross revenue (all order statuses). |\n| `line_cost` | FLOAT | Cost of goods sold for this order line = Unit Cost × Quantity. Sum for total COGS. |\n| `line_net_revenue` | FLOAT | Revenue recognised only for Completed orders (Cancelled / Returned = 0). Sum for net  revenue. |\n| `line_net_profit` | FLOAT | Profit for Completed orders = (Item Sale Price − Unit Cost) × Quantity, else 0. Sum for  total net profit. |\n\n## Joins\n\n- [Orders](./orders-e-commerce.md) — `order_id = order_id`\n- [Products](./products-e-commerce.md) — `product_id = product_id`\n", "e-commerce/purchases-list": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Purchases List\"\ndescription: \"This dataset contains detailed transaction records at the line-item level, including product quantities, pricing, and profitability metrics. It is primarily used to analyze sales performance, calculate margins, and track net revenue after adjustments.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-16T11:08:35.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `purchase_id` | STRING | PK. Unique identifier for each individual item line within a transaction. |\n| `order_id` | STRING | Unique identifier for the overall customer order or transaction. |\n| `product_id` | INTEGER | Unique numeric identifier for the specific product purchased. |\n| `quantity` | INTEGER | The number of units of the product included in the purchase line. |\n| `sale_price` | FLOAT | The price at which a single unit of the product was sold. |\n| `currency` | STRING | The three-letter ISO code representing the currency used for the transaction. |\n| `unit_cost` | FLOAT | The cost to the business for a single unit of the product. |\n| `line_revenue` | FLOAT | Total gross revenue for the line item, calculated as quantity multiplied by sale price. |\n| `line_cost` | FLOAT | Total cost for the line item, calculated as quantity multiplied by unit cost. |\n| `line_net_revenue` | FLOAT | The revenue for the line item after accounting for returns or adjustments. |\n| `line_net_profit` | FLOAT | The total profit generated by the line item after subtracting costs from net revenue. |\n", "e-commerce/reddit-ads-insights": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥉Reddit Ads | Insights\"\ndescription: \"OWOX data mart '🥉Reddit Ads | Insights'.\"\ntags: [\"owox\"]\ntimestamp: 2026-05-19T15:45:40.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `ad_id` | STRING | PK. The ID of the ad. |\n| `date` | DATE | PK. The date for this metric. |\n| `clicks` | INTEGER | The number of clicks detected for this report period. |\n| `cpc` | FLOAT | The cost-per-click for this period. |\n| `post_id` | STRING | The unique identifier of the post. |\n| `spend` | INTEGER | The amount (in microcurrency) spent for this report period. |\n| `impressions` | INTEGER | The number of impressions served for this report period. |\n| `hour` | STRING | The hour for this metric in ISO-8601. |\n| `engaged_click` | INTEGER | The number of engaged clicks such as RSVPs. |\n| `ecpm` | FLOAT | The effective CPM for this period. |\n| `cpv` | FLOAT | [Broken] The cost-per-view for this period. |\n| `ctr` | FLOAT | The click-through-rate for this period. |\n| `reach` | INTEGER | The number of unique users who saw the ad. |\n| `frequency` | FLOAT | The average number of times each user saw the ad. |\n| `currency` | STRING | The currency of the account. |\n", "e-commerce/sessions-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Sessions (E-Commerce)\"\ndescription: \"This Data Mart provides a detailed log of individual e-commerce browsing sessions, including traffic sources, device types, and conversion outcomes. It is primarily used to analyze user behavior, marketing attribution, and website performance across different geographic regions.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-16T02:42:23.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `date` | DATE | The specific date when the browsing session occurred FK to [🥈 Unified Ad Spend (E-Commerce)](./unified-ad-spend-e-commerce.md) |\n| `session_id` | STRING | PK. Unique identifier for an individual user session FK to [🥈 Orders (E-Commerce)](./orders-e-commerce.md) |\n| `customer_id` | INTEGER | Unique identifier of the customer associated with the session FK to [🥈 Customers (E-Commerce)](./customers-e-commerce.md) |\n| `device_category` | STRING | The type of hardware device used during the session (e.g., mobile, desktop) |\n| `conversion_seed` | FLOAT | A technical value used to simulate the probability of a transaction. |\n| `visitor_id` | STRING | Unique identifier for the anonymous or recognized visitor. FK to [🥈 Visitors (E-Commerce)](./visitors-e-commerce.md) |\n| `traffic_source_id` | INTEGER | Internal numeric identifier for the marketing traffic source. FK to [🥈 Traffic Sources (E-Commerce)](./traffic-sources-e-commerce.md) |\n| `country_id` | INTEGER | Numeric identifier representing the geographic country of the visitor. FK to [🥈 Countries (E-Commerce)](./countries-e-commerce.md) |\n| `is_conversion` | BOOLEAN | Indicates whether the session resulted in a successful transaction or goal completion. |\n| `source` | STRING | The origin of the traffic, such as Google, Facebook, or direct entry. FK to [🥈 Unified Ad Spend (E-Commerce)](./unified-ad-spend-e-commerce.md) |\n| `medium` | STRING | The high-level channel type of the traffic, such as organic or cost-per-click. FK to [🥈 Unified Ad Spend (E-Commerce)](./unified-ad-spend-e-commerce.md) |\n| `campaign` | STRING | The name of the specific marketing campaign that drove the session. |\n\n## Joins\n\n- [Visitors](./visitors-e-commerce.md) — `visitor_id = visitor_id`\n- [Traffic Sources](./traffic-sources-e-commerce.md) — `traffic_source_id = traffic_source_id`\n- [Countries](./countries-e-commerce.md) — `country_id = country_id`\n- [Pageviews](./pageviews-e-commerce.md) — `session_id = session_id`\n- [Customers](./customers-e-commerce.md) — `customer_id = customer_id`\n- [Orders](./orders-e-commerce.md) — `session_id = session_id`\n- [Unified Ad Spend](./unified-ad-spend-e-commerce.md) — `date = date`, `source = source`, `medium = medium`\n", "e-commerce/shopify-orders-2026": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Shopify Orders 2026\"\ndescription: \"OWOX data mart 'Shopify Orders 2026'.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-23T13:01:09.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `id` | STRING | PK. A globally-unique ID. |\n| `name` | STRING | The order name, generated by combining the order_number with the shop order prefix. |\n| `email` | STRING | The email address of the customer. |\n| `phone` | STRING | The phone number of the customer. |\n| `confirmed` | BOOLEAN | Whether the order is confirmed. |\n| `closed` | BOOLEAN | Whether the order is closed. |\n| `cancelledAt` | TIMESTAMP | The date and time when the order was cancelled. |\n| `cancelReason` | STRING | The reason for cancellation. |\n| `currencyCode` | STRING | The currency of the order. |\n| `subtotalPrice` | FLOAT | The subtotal price of the order. |\n| `totalPrice` | FLOAT | The total price of the order. |\n| `totalTax` | FLOAT | The total tax of the order. |\n| `totalShippingPrice` | FLOAT | The total shipping price. |\n| `totalDiscounts` | FLOAT | The total discounts applied. |\n| `discountCodes` | STRING | Discount codes applied to the order as JSON array (code, amount, type). |\n| `createdAt` | TIMESTAMP | The date and time when the order was created. |\n", "e-commerce/tiktok-ads-insights": "---\ntype: \"OWOX Data Mart\"\ntitle: \"TikTok Ads Insights\"\ndescription: \"TikTok Ad Insights with ad-level granularity.\"\ntags: [\"owox\"]\ntimestamp: 2026-05-26T20:09:01.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `ad_id` | STRING | PK. Ad ID |\n| `stat_time_day` | DATE | PK. Statistics Date |\n| `campaign_id` | STRING | Campaign ID |\n| `adgroup_id` | STRING | Ad Group ID |\n| `date_start` | DATE | Start Date |\n| `date_end` | DATE | End Date |\n| `clicks` | INTEGER | Clicks |\n| `impressions` | INTEGER | Impressions |\n| `cost` | FLOAT | Cost |\n| `ctr` | FLOAT | Click-Through Rate |\n| `conversion` | INTEGER | Conversions |\n| `cost_per_conversion` | FLOAT | Cost Per Conversion |\n| `conversion_rate` | FLOAT | Conversion Rate |\n| `reach` | INTEGER | Reach |\n| `engagement` | INTEGER | Engagement |\n| `video_views` | INTEGER | Video Views |\n| `video_watched_2s` | INTEGER | 2s Video Views |\n| `video_watched_6s` | INTEGER | 6s Video Views |\n| `spend` | FLOAT | Spend |\n| `video_completion` | INTEGER | Video Completion |\n", "e-commerce/traffic-sources-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Traffic Sources (E-Commerce)\"\ndescription: \"This Data Mart provides a comprehensive breakdown of website traffic origins, categorizing visitors by source, medium, and specific marketing campaigns. It is used to analyze the effectiveness of different acquisition channels and distinguish between paid and organic traffic performance.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-16T14:08:48.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `traffic_source_id` | INTEGER | Unique internal identifier for a specific combination of traffic source, medium, and campaign. |\n| `source` | STRING | The origin of the website traffic, such as a search engine, social network, or domain. |\n| `medium` | STRING | The high-level category of the traffic source, such as organic, cost-per-click, or referral. |\n| `campaign` | STRING | The specific marketing campaign name associated with the traffic. |\n| `is_paid` | BOOLEAN | Indicates whether the traffic was generated through a paid marketing channel. |\n| `channel_grouping` | STRING | The classification of traffic into broad categories like Paid Marketing, Direct, or Organic. |\n", "e-commerce/unified-ad-spend-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Unified Ad Spend (E-Commerce)\"\ndescription: \"This dataset provides a consolidated view of daily advertising expenditures and performance metrics across multiple marketing platforms. It allows users to analyze spend, clicks, and impressions at the campaign level to evaluate cross-channel marketing efficiency.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-23T07:00:35.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `date` | DATE | The calendar date when the advertising activity occurred. |\n| `source` | STRING | The name of the advertising platform or network where the traffic originated. |\n| `medium` | STRING | The marketing channel or payment model used, such as cost-per-click. |\n| `campaign` | STRING | The specific marketing campaign name associated with the ad spend. |\n| `spend` | FLOAT | The total cost of advertising incurred during the specified period. |\n| `clicks` | INTEGER | The total number of times users clicked on the advertisements. |\n| `impressions` | INTEGER | The total number of times the advertisements were displayed to users. |\n", "e-commerce/visitors-e-commerce": "---\ntype: \"OWOX Data Mart\"\ntitle: \"🥈 Visitors (E-Commerce)\"\ndescription: \"This dataset provides a comprehensive overview of website visitor behavior and acquisition history at the individual visitor level. It tracks engagement metrics like total sessions and visit dates alongside marketing attribution details to help analyze user retention and campaign effectiveness.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-17T14:28:27.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `visitor_id` | STRING | PK. Unique identifier for the website visitor. |\n| `linked_customer_id` | INTEGER | Identifier of the registered customer account associated with this visitor, if applicable. |\n| `first_seen_date` | DATE | The date when the visitor first interacted with the website. |\n| `last_seen_date` | DATE | The date of the most recent recorded interaction from this visitor. |\n| `total_sessions` | INTEGER | Total number of distinct browsing sessions initiated by the visitor. |\n| `acquisition_source` | STRING | The specific platform or site that referred the visitor to the website. |\n| `acquisition_medium` | STRING | The high-level channel type used to acquire the visitor, such as organic or paid search. |\n| `acquisition_campaign` | STRING | The name of the marketing campaign that originally brought the visitor to the site. |\n| `cohort_month` | DATE | The month and year of the visitor's first visit, used for retention analysis. |\n| `visitor_segment` | STRING | Classification of the visitor based on their engagement behavior or frequency. |\n| `country_id` | INTEGER | Numeric identifier representing the country where the visitor is located. |\n", "e-commerce/x-ads-stats": "---\ntype: \"OWOX Data Mart\"\ntitle: \"X Ads Stats\"\ndescription: \"OWOX data mart 'X Ads Stats'.\"\ntags: [\"owox\"]\ntimestamp: 2026-04-20T15:49:56.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `id` | STRING | PK. The unique identifier for the stats record. |\n| `date` | STRING | PK. The date for which the statistics were collected. |\n| `placement` | STRING | PK. The placement type (ALL_ON_TWITTER or PUBLISHER_NETWORK). |\n| `impressions` | INTEGER | Number of impressions. |\n| `tweets_send` | INTEGER | Number of tweets sent. |\n| `likes` | INTEGER | Number of likes. |\n| `unfollows` | INTEGER | Number of unfollows. |\n| `retweets` | INTEGER | Number of retweets. |\n| `app_clicks` | INTEGER | Number of app clicks. |\n| `follows` | INTEGER | Number of follows. |\n| `qualified_impressions` | INTEGER | Number of qualified impressions. |\n| `billed_charge_local_micro` | INTEGER | Billed amount in micros. |\n", "finance/accounts": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Accounts\"\ndescription: |\n  Every product a customer has opened — the funded relationships that turn a sign-up into\n  an active customer. Tracks how each holding was activated, its current balance, and\n  whether it is still active, dormant, frozen, closed, or written off. This is where you see\n  who actually became a funded customer and how healthy those relationships are.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:02:48.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `account_id` | STRING | PK. Unique account identifier. |\n| `customer_id` | STRING | Owning customer. FK to [Customer](./customer.md) |\n| `product_id` | STRING | Product held in this account. FK to [Product](./product.md) |\n| `opened_at` | DATE | Date the account was opened. Only customers with `kyc_status = passed` open accounts. |\n| `status` | STRING | Current account status. One of `active` / `dormant` / `frozen` / `closed` / `charged_off`. |\n| `current_balance` | NUMERIC | Current account balance. |\n| `activated_at` | DATE | First funding / first card use; `≥ opened_at`; null if never activated. |\n| `is_active` | BOOLEAN | Pure derivation: `is_active = (status = 'active')`. Not drawn independently. |\n\n# Example Questions\n\n- What share of opened accounts ever get activated, and how long does activation typically take?\n- How are balances distributed across active versus dormant relationships?\n- Which product types have the highest rate of accounts going dormant or being closed?\n\n## Joins\n\n- [Customer](./customer.md) — `customer_id = customer_id`\n- [Product](./product.md) — `product_id = product_id`\n", "finance/balances-monthly": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Balances (monthly)\"\ndescription: |\n  A month-by-month snapshot of every account's balance and the money it earns or costs the\n  business — interest earned on lending, interest paid on deposits, and fee income. This is\n  the view for understanding the earning power of the book over time and how balances build\n  up or run down.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:02:48.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `snapshot_id` | STRING | PK. Unique identifier for the monthly balance snapshot. |\n| `account_id` | STRING | Account the snapshot belongs to. FK to [Accounts](./accounts.md) |\n| `month` | DATE | Calendar month of the snapshot. |\n| `avg_balance` | NUMERIC | Average balance over the month. Carries month-over-month persistence per account (a random walk, not IID noise). |\n| `interest_earned` | NUMERIC | Interest income the bank earns on the account. Non-zero for `card` / `loan` / `BNPL` products (APR × outstanding balance); ~0 for `deposit`. |\n| `interest_paid` | NUMERIC | Interest the bank pays out to the customer. Non-zero for `deposit` products (deposit APY × `avg_balance`); ~0 for `card` / `loan` / `BNPL`. |\n| `fees` | NUMERIC | Fee income for the month; scales with `avg_balance` / activity, not an independent draw. |\n\n# Example Questions\n\n- What is the net interest margin across the book, and how does it trend month over month?\n- Which products and balance tiers contribute most to interest and fee income?\n- How stable are deposit balances over time, and where is money quietly draining away?\n\n## Joins\n\n- [Accounts](./accounts.md) — `account_id = account_id`\n", "finance/collections": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Collections\"\ndescription: |\n  Every action taken to recover money from loans that have fallen behind — reminders, calls,\n  restructures, and hand-offs to agencies — and what came of each. Tracks how much is\n  recovered and how effective different approaches are once a loan is delinquent or written\n  off. This is the last line of defense on losses.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T13:16:47.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `action_id` | STRING | PK. Unique identifier for the collections action. |\n| `loan_id` | STRING | Delinquent loan being worked; rows exist only for loans that reached ≥30 DPD or `is_charged_off`. FK to [Loans](./loans.md) |\n| `action_ts` | TIMESTAMP | When the action was taken. |\n| `action_type` | STRING | One of `reminder` / `call` / `restructure` / `agency_handoff`. Early-stage (reminder/call) at low DPD; late-stage (restructure/agency_handoff) once charged off. |\n| `outcome` | STRING | One of `promise_to_pay` / `paid` / `no_contact` / `dispute`. |\n| `amount_recovered` | NUMERIC | Money recovered by this action; bounded by remaining balance. Cumulative recovery per charged-off loan stays well under 100% and decays with time since charge-off. |\n\n# Example Questions\n\n- Which collections actions recover the most money relative to how often they are used?\n- After a loan is written off, how much is typically recovered, and how quickly does recovery taper off?\n- Do earlier interventions (reminders and calls) reduce how many loans end up handed to an agency?\n\n## Joins\n\n- [Loans](./loans.md) — `loan_id = loan_id`\n", "finance/customer": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Customer\"\ndescription: |\n  Everyone the business has taken on as a borrower, with the details that drive every\n  downstream decision: how they were acquired, whether they passed identity and eligibility\n  checks, their credit standing at sign-up, an internal risk tier, and whether they went on\n  to fund an account. The starting point for understanding who your customers are and where\n  they come from.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:02:47.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `customer_id` | STRING | PK. Unique customer identifier. |\n| `signup_date` | DATE | Date the customer signed up. |\n| `kyc_status` | STRING | `passed` / `pending` / `rejected`. Gates account opening — only `passed` customers get funded accounts. |\n| `risk_band` | STRING | Internal risk tier — the model's central conditioning variable. One of `prime` / `near_prime` / `subprime` / `deep_subprime`. Drives loan approval odds, APR, delinquency (DPD) and charge-off downstream. |\n| `credit_score` | INTEGER | Credit score at onboarding (~300–850). Consistent with `risk_band` (prime high, deep_subprime low). |\n| `acquisition_channel` | STRING | Channel that brought the customer in (e.g. `organic`, `paid_search`, `paid_social`, `referral`, `partner`). |\n| `region` | STRING | Customer's geographic region. |\n| `is_funded` | BOOLEAN | Activation flag — the source of truth for whether the customer ever funded an account (only KYC-passed customers can be funded). Accounts derives its `activated_at` from this: a customer is funded **iff** they have ≥1 account with a non-null `activated_at` (the two are kept consistent by construction). |\n\n# Example Questions\n\n- Which marketing channels bring in the highest share of low-risk, creditworthy customers?\n- How many people pass the initial checks but never open a funded account — and where are they lost?\n- Does a customer's credit standing at sign-up line up with whether they become an active, funded borrower?\n", "finance/loans": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Loans\"\ndescription: |\n  Every loan application and what happened to it — approved, declined, or withdrawn —\n  through to how much was actually funded and at what rate. Captures the full underwriting\n  funnel, the reasons applications are turned down, and the pricing applied to each borrower\n  based on their risk. This is the origination story of the loan book.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:02:48.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `loan_id` | STRING | PK. Unique loan identifier. |\n| `customer_id` | STRING | Borrowing customer. FK to [Customer](./customer.md) |\n| `product_id` | STRING | Loan product applied for. FK to [Product](./product.md) |\n| `applied_at` | DATE | Date the loan was applied for. |\n| `decision` | STRING | `approved` / `declined` / `withdrawn`. Approval odds conditioned on the customer's `risk_band`. |\n| `approved_amount` | NUMERIC | Amount approved at underwriting; null unless `decision = approved`. |\n| `funded_amount` | NUMERIC | Amount actually funded; `≤ approved_amount`; null unless funded. Approved → funded is the pull-through rate. |\n| `apr` | FLOAT | APR on the loan. Seeded from the product's rate-card `apr` and adjusted by a risk-based spread (higher for riskier bands). |\n| `term_months` | INTEGER | Loan term; selected from the product's stated term, not drawn independently. |\n| `funded_at` | DATE | Date funded; `≥ applied_at`; null unless funded. |\n| `status` | STRING | Current loan status. One of `current` / `delinquent` / `charged_off` / `paid_off`. |\n| `decline_reason` | STRING | Adverse-action reason (ECOA/Reg B); populated only when `decision = declined`. One of `insufficient_credit_history` / `debt_to_income_too_high` / `delinquent_credit_obligations` / `income_verification_failed` / `fraud_flag`. Weighted by `risk_band`. |\n\n# Example Questions\n\n- How do approval rates and interest rates vary across borrower risk tiers?\n- Of the loans approved, what share actually gets funded, and where does the funnel leak?\n- What are the most common reasons applications are declined, and how does that differ by risk tier?\n\n## Joins\n\n- [Customer](./customer.md) — `customer_id = customer_id`\n- [Product](./product.md) — `product_id = product_id`\n", "finance/product": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Product\"\ndescription: |\n  The catalog of products the business offers — deposits, cards, loans, and\n  buy-now-pay-later — each with its headline rate and standard term. For deposits the rate\n  is what the business pays the customer; for credit products it is what the customer is\n  charged. This is the lookup that gives every account and loan its pricing context.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:02:47.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `product_id` | STRING | PK. Unique product identifier. |\n| `name` | STRING | Product display name. |\n| `product_type` | STRING | `deposit` / `card` / `loan` / `BNPL`. |\n| `apr` | FLOAT | Rate-card reference rate. Meaning depends on `product_type`: for `deposit` it is the APY *paid to* the customer (low, ~0.5–4%); for `card` / `loan` / `BNPL` it is the rate *charged to* the customer. `Loans.apr` is seeded from this and adjusted by risk-based spread. |\n| `term_months` | INTEGER | Stated product term in months. (BNPL \"Pay in 4\" is modeled here as a short months-denominated term — a deliberate simplification, not real biweekly installments.) |\n\n# Example Questions\n\n- How does the rate charged on lending products compare with the rate paid out on deposits?\n- Which product types carry the longest terms, and how does that shape the revenue they generate?\n- How is the customer base split between savings products and credit products?\n", "finance/repayments": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Repayments\"\ndescription: |\n  The repayment schedule for every funded loan and how each installment actually played\n  out — paid on time, paid late, or missed. Tracks how far behind each loan falls, the\n  principal still outstanding, and the point at which a loan is written off. This is where\n  the health of the loan book, and the losses building in it, become visible.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:02:49.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `repayment_id` | STRING | PK. Unique repayment identifier. |\n| `loan_id` | STRING | Loan this repayment belongs to. FK to [Loans](./loans.md) |\n| `due_date` | DATE | Date the payment is due. The full set of rows amortizes the loan's `funded_amount` at its `apr` over `term_months`. |\n| `paid_date` | DATE | Date the payment was made; null if unpaid. |\n| `due_amount` | NUMERIC | Scheduled principal + interest for the installment (from the amortization schedule). |\n| `paid_amount` | NUMERIC | Amount actually paid (0 / partial / full). |\n| `days_past_due` | INTEGER | DPD; progresses through the 0 / 30 / 60 / 90 / 120+ ladder per loan (roll-rate mechanics), not an independent draw. Conditioned on `risk_band`. |\n| `outstanding_principal` | NUMERIC | Remaining principal after this installment — enables dollar-weighted roll-rate and vintage analysis. |\n| `is_charged_off` | BOOLEAN | True only once cumulative DPD crosses the charge-off threshold (FFIEC: 120 days installment / 180 days revolving). |\n\n# Example Questions\n\n- How does the rate of loans falling 90+ days behind differ across risk tiers?\n- What share of lent principal ends up written off, and how does that build over the life of a loan?\n- How many delinquent loans recover and return to good standing versus rolling into write-off?\n\n## Joins\n\n- [Loans](./loans.md) — `loan_id = loan_id`\n", "finance/transactions": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Transactions\"\ndescription: |\n  Every payment, withdrawal, transfer, and card authorization flowing through customer\n  accounts — the day-to-day activity that shows how engaged customers are and where fraud\n  shows up. Each record carries the amount, merchant category, channel, whether it was\n  declined, and the fraud assessment made at the time of authorization. The pulse of\n  everyday customer behavior.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:02:49.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `txn_id` | STRING | PK. Unique transaction identifier. |\n| `account_id` | STRING | Account the transaction belongs to. FK to [Accounts](./accounts.md) |\n| `txn_ts` | TIMESTAMP | When the transaction occurred. |\n| `txn_type` | STRING | One of `purchase` / `atm_withdrawal` / `transfer` / `direct_debit` / `refund` / `fee`. |\n| `mcc` | STRING | Merchant category code. Typical `amount` and implied interchange vary by MCC. |\n| `amount` | NUMERIC | Transaction amount. |\n| `currency` | STRING | Currency; consistent with the customer's `region`. |\n| `is_declined` | BOOLEAN | Whether declined. Overall approval ~85–95%; declines skew to low/mid `fraud_score` (false positives) plus high-score fraud blocks. |\n| `fraud_score` | FLOAT | Model score at authorization (0–1). |\n| `is_confirmed_fraud` | BOOLEAN | Post-investigation label. Steeply correlated with high `fraud_score`; overall a low-basis-points share of volume. Together with `fraud_score` gives capture rate vs false-positive declines. |\n| `channel` | STRING | One of `card_present` / `ecommerce` / `atm` / `online_banking` / `mobile`. |\n\n# Example Questions\n\n- Where does the fraud-detection system catch real fraud versus wrongly declining good customers?\n- Which spending categories and channels drive the most transaction volume and value?\n- How does everyday account activity differ between engaged customers and those going dormant?\n\n## Joins\n\n- [Accounts](./accounts.md) — `account_id = account_id`\n", "healthcare/appointments": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Appointments\"\ndescription: |\n  One row per scheduled appointment, capturing how a visit was booked and whether the patient\n  actually showed up. Each row links a patient, a provider and a department, records the\n  scheduled date and time, how far in advance it was booked (lead time), how long the patient\n  waited past that time, whether they were a no-show, and the appointment's final status. This\n  is the front door of the clinical and revenue cycle — every encounter and claim downstream\n  starts as a booked appointment here.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:12.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `appointment_id` | STRING | PK. Unique appointment identifier. |\n| `patient_id` | STRING | Patient who booked the appointment. FK to [Patient](./patient.md) |\n| `provider_id` | STRING | Provider seeing the patient. FK to [Provider](./provider.md) |\n| `scheduled_at` | TIMESTAMP | Scheduled date and time of the appointment. |\n| `department_id` | STRING | Department where the appointment takes place. FK to [Department](./department.md) |\n| `status` | STRING | Appointment status (e.g. booked, completed, cancelled). |\n| `is_no_show` | BOOLEAN | Whether the patient failed to show up. |\n| `wait_minutes` | INTEGER | Door-to-provider wait. |\n| `lead_time_days` | INTEGER | Booking-to-visit lead time — no-show driver. |\n\n# Example Questions\n\n- How does no-show rate change with booking lead time, and which lead-time windows should scheduling policy target first?\n- Which departments or providers have the longest patient wait times, and is that linked to no-show behavior?\n- What share of scheduled appointments convert to completed visits versus cancellations and no-shows?\n\n## Joins\n\n- [Department](./department.md) — `department_id = department_id`\n- [Patient](./patient.md) — `patient_id = patient_id`\n- [Provider](./provider.md) — `provider_id = provider_id`\n", "healthcare/bed-census-daily": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Bed Census (daily)\"\ndescription: |\n  One row per department per day, tracking inpatient bed capacity and patient flow over time.\n  Each row records how many beds were staffed and how many were occupied that day, alongside\n  the day's admissions and discharges — the numbers that drive occupancy rate and reveal\n  whether a department is filling up or emptying out. This is the operational pulse of\n  capacity management across the health system.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:11.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `census_id` | STRING | PK. Unique identifier for the daily census record. |\n| `department_id` | STRING | Department the census covers. FK to [Department](./department.md) |\n| `census_date` | DATE | Calendar day of the census. |\n| `staffed_beds` | INTEGER | Beds staffed and available that day. |\n| `occupied_beds` | INTEGER | Beds occupied at census time — utilization numerator. |\n| `admissions` | INTEGER | Admissions during the day. |\n| `discharges` | INTEGER | Discharges during the day. |\n\n# Example Questions\n\n- Which departments run at the highest occupancy, and how close are they to their staffed-bed capacity?\n- How does daily occupancy trend over time as admissions and discharges fluctuate?\n- Are there departments where staffed beds are consistently underused relative to demand?\n\n## Joins\n\n- [Department](./department.md) — `department_id = department_id`\n", "healthcare/claims": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Claims\"\ndescription: |\n  One row per claim submitted to a payer for a clinical encounter — the revenue-cycle record\n  that turns care into cash. Each claim tracks the billed, payer-allowed and actually paid\n  amounts, its submission and payment dates, current status, the denial reason when one\n  applies, and the number of days it has sat in accounts receivable. This is the mart that\n  answers how well the health system gets paid for the care it delivers, and how quickly.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:13.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `claim_id` | STRING | PK. Unique claim identifier. |\n| `encounter_id` | STRING | Encounter the claim is billed for. FK to [Encounters](./encounters.md) |\n| `payer_id` | STRING | Payer responsible for the claim. FK to [Payer](./payer.md) |\n| `submitted_at` | DATE | Date the claim was submitted. |\n| `paid_at` | DATE | Date the claim was paid. |\n| `billed_amount` | NUMERIC | Amount billed to the payer. |\n| `allowed_amount` | NUMERIC | Payer-allowed amount. |\n| `paid_amount` | NUMERIC | Amount actually paid. |\n| `status` | STRING | Claim status (e.g. submitted, paid, denied). |\n| `denial_code` | STRING | CARC/RARC denial reason, when denied. |\n| `ar_days` | INTEGER | Days in accounts receivable — revenue-cycle speed. |\n\n# Example Questions\n\n- What is the claim denial rate, and which denial reasons account for the most lost revenue?\n- How much longer do denied claims spend in accounts receivable than clean, paid claims?\n- How does the gap between billed and paid amounts vary by payer?\n\n## Joins\n\n- [Encounters](./encounters.md) — `encounter_id = encounter_id`\n- [Payer](./payer.md) — `payer_id = payer_id`\n", "healthcare/department": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Department\"\ndescription: |\n  Reference list of the clinical departments that make up the health system, each with the\n  clinical specialty it serves and its staffed-bed capacity. Departments are the organizational\n  unit behind appointments, provider assignments and daily bed census — staffed beds is the\n  denominator for every occupancy and capacity calculation in the model.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:11.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `department_id` | STRING | PK. Unique department identifier. |\n| `name` | STRING | Department name. |\n| `specialty` | STRING | Clinical specialty the department serves. |\n| `staffed_beds` | INTEGER | Number of staffed beds — the utilization denominator. |\n\n# Example Questions\n\n- Which departments carry the most staffed-bed capacity, and how does that compare to their appointment and patient volume?\n- How is clinical specialty distributed across departments?\n- Which departments are capacity-constrained relative to peers with a similar specialty?\n", "healthcare/encounters": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Encounters\"\ndescription: |\n  One row per clinical encounter — the actual visit that followed a scheduled appointment.\n  Each encounter records its type (outpatient, inpatient or emergency department), the primary\n  diagnosis, admission and discharge timestamps, the resulting length of stay, and whether it\n  was an unplanned readmission within 30 days. This is where the clinical story lives: what\n  patients are being treated for, how long they stay, and how often they come back\n  unexpectedly.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:13.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `encounter_id` | STRING | PK. Unique clinical encounter identifier. |\n| `appointment_id` | STRING | Appointment that led to this encounter. FK to [Appointments](./appointments.md) |\n| `patient_id` | STRING | Patient seen in the encounter. FK to [Patient](./patient.md) |\n| `provider_id` | STRING | Provider who delivered care. |\n| `admit_ts` | TIMESTAMP | Admission date and time. |\n| `discharge_ts` | TIMESTAMP | Discharge date and time. |\n| `encounter_type` | STRING | outpatient / inpatient / ED. |\n| `primary_diagnosis` | STRING | Primary ICD-10 code. |\n| `length_of_stay_days` | FLOAT | Length of stay in days. |\n| `is_readmission_30d` | BOOLEAN | Unplanned readmission within 30 days. |\n\n# Example Questions\n\n- What is the 30-day readmission rate for inpatient stays, and which diagnoses show the highest recurrence?\n- How does average length of stay differ across outpatient, inpatient and ED encounters?\n- Which primary diagnoses account for the most encounter volume, and how does that mix differ between outpatient and inpatient care?\n\n## Joins\n\n- [Appointments](./appointments.md) — `appointment_id = appointment_id`\n- [Patient](./patient.md) — `patient_id = patient_id`\n", "healthcare/patient": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Patient\"\ndescription: |\n  One row per patient, the demographic and coverage anchor for every appointment, encounter\n  and claim in the system. Each patient carries a birth year and gender for age-banded analysis,\n  a postal code for geographic reach, an insurance type (commercial, Medicare, Medicaid or\n  self-pay) that determines how their care gets billed, a risk-stratification tier used by care\n  management to flag patients who need closer follow-up, and the date they first registered\n  with the system.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:11.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `patient_id` | STRING | PK. Unique de-identified patient identifier. |\n| `birth_year` | INTEGER | Year of birth, used for age banding. |\n| `gender` | STRING | Patient gender. |\n| `postal_code` | STRING | Patient postal/ZIP code for geographic analysis. |\n| `insurance_type` | STRING | commercial / Medicare / Medicaid / self-pay. |\n| `risk_tier` | STRING | Risk-stratification band for care management. |\n| `registered_at` | DATE | Date the patient was first registered. |\n\n# Example Questions\n\n- How is the patient population split across insurance types, and how has that mix shifted as new patients register?\n- What share of patients fall into higher-risk tiers, and how does that skew by age band?\n- Which postal codes or regions are driving the most new patient registrations?\n", "healthcare/payer": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Payer\"\ndescription: |\n  Reference list of the insurance payers and plans that reimburse the health system for care,\n  each identified by name and plan type — HMO, PPO, EPO or government (Medicare/Medicaid). Every\n  claim is billed to one of these payers, so this mart is the lookup behind any payer-mix or\n  reimbursement analysis.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:12.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `payer_id` | STRING | PK. Unique payer identifier. |\n| `name` | STRING | Payer / insurance plan name. |\n| `plan_type` | STRING | HMO / PPO / EPO / government. |\n\n# Example Questions\n\n- What is the split between government and commercial plan types among the payers the system bills?\n- Which payers make up the largest share of billed claim volume?\n- How does reimbursement performance differ between HMO, PPO and EPO plans?\n", "healthcare/provider": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Provider\"\ndescription: |\n  One row per clinician, the roster behind every appointment and encounter. Each provider is\n  identified by name, clinical specialty, home department, and National Provider Identifier\n  (NPI) — the standard identifier used to credential and bill for a clinician's services. This\n  is the lens for looking at care delivery by clinician: who is seeing patients, in what\n  specialty, and out of which department.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:12.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `provider_id` | STRING | PK. Unique provider identifier. |\n| `full_name` | STRING | Provider's full name. |\n| `specialty` | STRING | Clinical specialty of the provider. |\n| `department` | STRING | Department the provider belongs to. |\n| `npi` | STRING | National Provider Identifier. |\n\n# Example Questions\n\n- How many providers does each specialty and department have, and does that staffing match patient demand?\n- Which providers or specialties carry the highest appointment and encounter volume?\n- Are certain specialties concentrated in a handful of departments, or spread thinly across the system?\n", "marketing-leadgen/account": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Account\"\ndescription: |\n  One row per target company, the firmographic backbone the rest of the model hangs off. Every\n  account carries an industry, an employee-count band and a region, plus a flag marking whether\n  it sits on the account-based marketing (ABM) target list. Because real B2B deals belong to\n  accounts rather than to whichever individual filled out a form, this mart is the join point\n  that lets leads, opportunities and touchpoints be rolled up to \"who is this company, and how\n  big an opportunity is it.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:31.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `account_id` | STRING | PK. Unique identifier for the target company. |\n| `name` | STRING | Company name. |\n| `industry` | STRING | Industry the company operates in. |\n| `employee_band` | STRING | Company-size bucket — the mid-market segmentation axis. Vocabulary: `1-50` / `51-200` / `201-1000` / `1000+`. |\n| `region` | STRING | Geographic region of the company. |\n| `is_target_account` | BOOLEAN | Whether the company is on the ABM target list. ~10–20% of accounts, skewed toward larger `employee_band`; target accounts show higher engagement, pipeline and win rate. |\n\n# Example Questions\n\n- How is the account base distributed across industries, company sizes and regions?\n- Do target accounts on the ABM list actually generate more pipeline and win more often than the rest of the book?\n- Which industries or employee bands should the target-account list be expanded into?\n", "marketing-leadgen/ad-spend": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Ad Spend\"\ndescription: |\n  Daily cost, impressions and clicks for every paid campaign, broken out by ad group. This is\n  the cost side of the funnel — the numbers a demand-gen team reconciles against Google Ads,\n  LinkedIn Ads and other platform reports every week to know what a click, a lead and ultimately\n  a closed deal actually costs.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:31.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `spend_id` | STRING | PK. Unique identifier for each spend record. |\n| `spend_date` | DATE | Day the spend was incurred. Within the campaign's `[start_date, end_date]` flight. |\n| `campaign_id` | STRING | Campaign this spend belongs to. FK to [Campaign](./campaign.md) |\n| `channel` | STRING | Marketing channel where the cost was spent. Denormalized copy of the campaign's `channel`. |\n| `ad_group` | STRING | Ad group or ad set within the campaign. |\n| `impressions` | INTEGER | Number of times ads were shown. |\n| `clicks` | INTEGER | Number of clicks the ads received. Always `≤ impressions`; CTR by channel. |\n| `cost` | NUMERIC | Money spent on this ad group for the day (USD). Derived from clicks × per-channel CPC. |\n\n# Example Questions\n\n- What is the blended and per-channel CPC and CTR, and how do they trend week over week?\n- Which campaigns or ad groups are burning budget without matching traffic or click performance?\n- How does cost per lead and cost per opportunity compare across channels once spend is joined to downstream conversions?\n\n## Joins\n\n- [Campaign](./campaign.md) — `campaign_id = campaign_id`\n", "marketing-leadgen/campaign": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Campaign\"\ndescription: |\n  Reference of every marketing initiative run — paid and non-paid alike, from search and social\n  ads to email nurtures, webinars and content syndication — each carrying its channel, its\n  objective and the UTM tags that tie it back to ad-platform and web-analytics data. This is the\n  conformed campaign dimension of the model: every channel value that shows up on ad spend, web\n  sessions, touchpoints or opportunities agrees with what is declared here, so a channel-level\n  report never splits into phantom categories.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:31.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `campaign_id` | STRING | PK. Unique identifier for each campaign. |\n| `campaign_name` | STRING | Human-readable name of the campaign. |\n| `channel` | STRING | Marketing channel. Controlled vocabulary: `paid_search`, `paid_social`, `display`, `organic_search`, `email`, `webinar`, `content_syndication`, `direct`, `referral`. |\n| `objective` | STRING | Primary goal. One of: `awareness`, `lead_generation`, `conversion`, `retargeting`. |\n| `utm_source` | STRING | UTM source tag identifying where the traffic originates. |\n| `utm_medium` | STRING | UTM medium tag describing the type of traffic (e.g. cpc, email). |\n| `utm_campaign` | STRING | UTM campaign tag — the key ad-platform ↔ web-analytics join key. |\n| `start_date` | DATE | Date the campaign went live. |\n| `end_date` | DATE | Date the campaign flight ended (nullable for always-on). Spend/touches fall within `[start_date, end_date]`. |\n\n# Example Questions\n\n- How many campaigns are running per channel and objective, and how does that mix shift over time?\n- Which campaigns are actively in-flight versus always-on programs like nurture or content syndication?\n- How does spend, traffic and pipeline performance compare across campaigns that share the same objective (e.g. all lead-generation campaigns)?\n", "marketing-leadgen/lead": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Lead\"\ndescription: |\n  One row per lead or contact captured by marketing, carrying where they came from, their\n  fit-and-engagement score, the dated milestones marking when they became marketing-qualified\n  (MQL) and sales-qualified (SQL), and firmographics that mirror the account they belong to.\n  Because the qualification milestones are dated rather than just a current-state label, leads\n  can be grouped into cohorts — \"leads created in March\" — and tracked through the funnel over\n  time, not just counted at a single point.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:32.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `lead_id` | STRING | PK. Unique identifier for each lead or contact. |\n| `account_id` | STRING | Company the lead belongs to; null for a lead not yet matched to an account. FK to [Account](./account.md) |\n| `created_at` | TIMESTAMP | When the lead first entered the system (coincides with the `is_lead_create` touchpoint). |\n| `source_channel` | STRING | Channel that first brought in the lead. Equals the channel of the lead's `is_lead_create` touchpoint. Same controlled vocabulary as [Campaign](./campaign.md)`.channel`. |\n| `lead_score` | INTEGER | Fit + engagement score for MQL gating. |\n| `became_mql_at` | TIMESTAMP | When the lead reached marketing-qualified status; null if never MQL. `created_at ≤ became_mql_at`. |\n| `became_sql_at` | TIMESTAMP | When the lead reached sales-qualified status; null if never SQL. `became_mql_at ≤ became_sql_at`. |\n| `employee_band` | STRING | Company-size bucket. Same vocabulary as [Account](./account.md)`.employee_band`: `1-50` / `51-200` / `201-1000` / `1000+`. For matched leads, agrees with the account. |\n| `industry` | STRING | Industry the lead's company operates in. For matched leads, agrees with the account. |\n| `country` | STRING | Country where the lead is located; consistent with the account's `region`. |\n| `lifecycle_stage` | STRING | `subscriber` / `lead` / `MQL` / `SQL` / `opportunity` / `customer`. Consistent with the `became_*_at` timestamps and with the existence of an [Opportunities](./opportunities.md) row. |\n\n# Example Questions\n\n- What is the lead-to-MQL and MQL-to-SQL conversion rate, and how many days does each stage typically take?\n- Which source channels and industries produce the highest-scoring, fastest-qualifying leads?\n- How much of the funnel is unmatched to an account, and does that share differ by source channel?\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n", "marketing-leadgen/opportunities": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Opportunities\"\ndescription: |\n  One row per sales opportunity — the deal object, keyed to the account rather than a single\n  lead, since real B2B buying committees involve multiple people. Each row carries the pipeline\n  stage, the deal size (ACV), the sourcing lead and campaign, and the win/loss outcome with\n  close date and sales-cycle length. This is where marketing-sourced pipeline turns into — or\n  fails to turn into — closed revenue.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:32.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `opportunity_id` | STRING | PK. Unique identifier for each sales opportunity. |\n| `account_id` | STRING | Account the deal belongs to — the primary spine. FK to [Account](./account.md) |\n| `lead_id` | STRING | Sourcing/converting lead the opportunity originated from; nullable. FK to [Lead](./lead.md) |\n| `primary_campaign_id` | STRING | Primary Campaign Source (single-touch sourcing); nullable. Equals the campaign of the sourcing lead's `is_lead_create` touchpoint. FK to [Campaign](./campaign.md) |\n| `created_at` | TIMESTAMP | When the opportunity was created. |\n| `stage` | STRING | Current pipeline stage. One of: `discovery`, `demo`, `proposal`, `negotiation`, `closed_won`, `closed_lost`. |\n| `amount` | NUMERIC | ACV / deal size (USD). Correlates with the account's `employee_band`. |\n| `close_date` | DATE | Date the opportunity was won or lost; null while open. |\n| `is_won` | BOOLEAN | True iff `stage = closed_won` (then `close_date` is set); false with a `close_date` means `closed_lost`. |\n| `sales_cycle_days` | INTEGER | `DATE_DIFF(close_date, created_at, DAY)` for closed deals; null while open. |\n| `owner` | STRING | Sales rep who owns the opportunity (drawn from a small stable roster). |\n\n# Example Questions\n\n- What is the win rate and average sales cycle by deal size, industry or account segment?\n- Which accounts, campaigns or reps are driving the most pipeline and revenue?\n- Do target (ABM) accounts close bigger and faster deals than non-target accounts?\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [Campaign](./campaign.md) — `primary_campaign_id = campaign_id`\n- [Lead](./lead.md) — `lead_id = lead_id`\n", "marketing-leadgen/stage-transitions": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Stage Transitions\"\ndescription: |\n  One row per pipeline stage change for a sales opportunity, tracing each deal's path through\n  discovery, demo, proposal and negotiation on the way to a win or a loss. The time spent in\n  each stage before moving to the next is the raw material for bottleneck analysis — where deals\n  get stuck, and for how long.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:32.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `transition_id` | STRING | PK. Unique identifier for the stage change. |\n| `opportunity_id` | STRING | Opportunity that moved stage. FK to [Opportunities](./opportunities.md) |\n| `from_stage` | STRING | Stage the opportunity left. |\n| `to_stage` | STRING | Stage the opportunity entered. Contiguous chain: `to_stage` of row n = `from_stage` of row n+1; the last `to_stage` equals `Opportunities.stage`. |\n| `transitioned_at` | TIMESTAMP | When the stage change happened. Within `[Opportunities.created_at, close_date]`. |\n| `days_in_from_stage` | INTEGER | Days spent in the previous stage — the velocity bottleneck driver. Sums (per opportunity) to the sales cycle for closed deals. |\n\n# Example Questions\n\n- Which pipeline stage is the biggest bottleneck, and does that differ for won versus lost deals?\n- How long, on average, does a deal spend in proposal or negotiation before closing?\n- How often do opportunities move backward a stage, and does that predict a lower win rate?\n\n## Joins\n\n- [Opportunities](./opportunities.md) — `opportunity_id = opportunity_id`\n", "marketing-leadgen/touchpoints": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Touchpoints\"\ndescription: |\n  One row per marketing touch a lead has on the way to becoming a customer, credited under a\n  W-shaped multi-touch attribution model that splits credit 30% to the first touch, 30% to lead\n  creation, 30% to opportunity creation and 10% across everything in between. This is the mart\n  that answers \"which channels and campaigns actually deserve credit,\" rather than crediting\n  only the first click or the last one.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:33.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `touchpoint_id` | STRING | PK. Unique identifier for each marketing touch. |\n| `lead_id` | STRING | Lead that this touch belongs to. FK to [Lead](./lead.md) |\n| `campaign_id` | STRING | Campaign associated with this touch. FK to [Campaign](./campaign.md) |\n| `occurred_at` | TIMESTAMP | When the touch happened. |\n| `channel` | STRING | Channel where the touch occurred. Equals the campaign's `channel`; same controlled vocabulary as [Campaign](./campaign.md)`.channel`. |\n| `touch_type` | STRING | Kind of interaction. One of: `ad_click`, `form_fill`, `email_open`, `email_click`, `webinar_attend`, `content_download`, `demo_request`. Consistent with `channel` (e.g. no `email_open` on `paid_search`). |\n| `touch_credit` | FLOAT | W-shaped credit for this touch. Sums to exactly 1.0 per lead: 30% first touch, 30% lead creation, 30% opportunity creation, 10% across middle touches. |\n| `is_first_touch` | BOOLEAN | True on the lead's earliest touch (exactly one per lead). W-shaped anchor. |\n| `is_lead_create` | BOOLEAN | True on the touch that created the lead (exactly one per lead; coincides with `Lead.created_at`). W-shaped anchor. |\n| `is_opp_create` | BOOLEAN | True on the touch that created the opportunity (at most one per lead; only for leads with an opportunity; coincides with `Opportunities.created_at`). W-shaped anchor. |\n\n# Example Questions\n\n- Which channels and campaigns earn the most attributed credit across the full buyer journey, not just first- or last-touch?\n- How many touches, and of what type, does a typical lead have before becoming an opportunity?\n- How does attributed pipeline by campaign compare to what a single-touch (first- or last-touch) view would show?\n\n## Joins\n\n- [Campaign](./campaign.md) — `campaign_id = campaign_id`\n- [Lead](./lead.md) — `lead_id = lead_id`\n", "marketing-leadgen/web-sessions": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Web Sessions\"\ndescription: |\n  One row per web session, the very top of the funnel, before most visitors are ever identified\n  as a lead. Each session records the traffic source and medium, the landing page, whether it\n
