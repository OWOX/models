 converted into a form submission, and — for the small share of visitors identified through\n  identity stitching — the lead that session belongs to. Because the overwhelming majority of\n  B2B web traffic never converts or gets identified, most sessions carry no lead at all; the\n  ones that do show exactly where anonymous traffic turns into a known contact.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T17:34:33.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `session_id` | STRING | PK. Unique identifier for the web session. |\n| `lead_id` | STRING | Known lead after identity stitching; null for never-identified visitors (the overwhelming majority). FK to [Lead](./lead.md) |\n| `started_at` | TIMESTAMP | When the session began. |\n| `campaign_id` | STRING | Campaign that drove the session; null for organic/direct. FK to [Campaign](./campaign.md) |\n| `source` | STRING | Traffic source that referred the session; consistent with the driving campaign's `utm_source`. |\n| `medium` | STRING | Marketing medium (e.g. organic, cpc, email); consistent with the driving campaign's `utm_medium`. |\n| `landing_page` | STRING | First page viewed in the session. |\n| `form_submits` | INTEGER | Number of forms submitted during the session. `≥ 1` when `is_conversion` is true. |\n| `is_conversion` | BOOLEAN | Whether the session produced a lead or demo request. Session→lead conversion ~1–3% overall, lowest on paid social. |\n\n# Example Questions\n\n- What is the session-to-lead conversion rate by channel and landing page, and which channels are strongest at the top of the funnel?\n- Which campaigns drive the most traffic volume, and how does that traffic's conversion quality compare across them?\n- How much of paid versus organic/direct traffic actually results in a form submission?\n\n## Joins\n\n- [Campaign](./campaign.md) — `campaign_id = campaign_id`\n- [Lead](./lead.md) — `lead_id = lead_id`\n", "marketplace/buyer": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Buyer\"\ndescription: \"The demand side — one row per buyer, with lifetime order count and repeat flag.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-24T10:45:16.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `buyer_id` | STRING | PK. Unique buyer identifier. |\n| `signup_date` | DATE | When the buyer first registered. |\n| `acquisition_channel` | STRING | Marketing source that brought the buyer in. |\n| `region` | STRING | Buyer's geographic region. |\n| `segment` | STRING | Buyer segment (one-time, occasional, regular, power). |\n| `lifetime_orders` | INTEGER | Total orders the buyer has placed to date. |\n| `is_repeat` | BOOLEAN | Whether the buyer has placed 2+ orders — demand-side retention. |\n", "marketplace/cancellations": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Cancellations\"\ndescription: \"One row per cancelled order — the stage, cause, initiator and refund.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-24T10:45:13.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `cancellation_id` | STRING | PK. Unique cancellation identifier. |\n| `order_id` | STRING | Order that was cancelled. FK to [Orders](./orders.md) |\n| `cancelled_at` | TIMESTAMP | When the cancellation happened. |\n| `cancelled_by` | STRING | Who cancelled: buyer, seller or platform. |\n| `stage` | STRING | Order stage at cancellation: pre-payment, pre-fulfilment or in-transit. |\n| `reason` | STRING | Stated cancellation reason. |\n| `refund_amount` | NUMERIC | Amount refunded to the buyer (never more than the order's gmv). |\n\n## Joins\n\n- [Orders](./orders.md) — `order_id = order_id`\n", "marketplace/category": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Category\"\ndescription: \"Reference of marketplace categories and the platform take rate charged in each.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-24T10:45:16.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `category_id` | STRING | PK. Unique category identifier. |\n| `name` | STRING | Display name of the category. |\n| `parent_category` | STRING | Parent grouping in the category tree (Goods, Media, Services). |\n| `take_rate_pct` | FLOAT | Platform's standard commission for the category, as a percent (e.g. 12.0 = 12%) — the take-rate optimisation lever. |\n", "marketplace/listings": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Listings\"\ndescription: \"One row per listing/offer — the supply inventory buyers can order from.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-24T10:45:14.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `listing_id` | STRING | PK. Unique listing identifier. |\n| `seller_id` | STRING | Seller that owns the listing. FK to [Seller](./seller.md) |\n| `created_at` | TIMESTAMP | When the listing was created. |\n| `category_id` | STRING | Category the listing belongs to. FK to [Category](./category.md) |\n| `price` | NUMERIC | Listed price of the offer. |\n| `status` | STRING | Current listing status: active, paused, sold_out or removed. |\n| `is_available` | BOOLEAN | Whether the listing is live inventory — supply availability. |\n\n## Joins\n\n- [Category](./category.md) — `category_id = category_id`\n- [Seller](./seller.md) — `seller_id = seller_id`\n", "marketplace/orders": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Orders\"\ndescription: \"The match — one row per order, carrying GMV, take rate, platform revenue and seller payout.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-24T10:45:13.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `order_id` | STRING | PK. Unique order identifier. |\n| `buyer_id` | STRING | Buyer on the order. FK to [Buyer](./buyer.md) |\n| `seller_id` | STRING | Seller on the order (always the listing's owner). FK to [Seller](./seller.md) |\n| `listing_id` | STRING | Listing that was purchased. FK to [Listings](./listings.md) |\n| `category_id` | STRING | Category of the purchased listing, denormalised for slicing. FK to [Category](./category.md) |\n| `ordered_at` | TIMESTAMP | When the order was placed. |\n| `quantity` | INTEGER | Units ordered (gmv = listing price × quantity). |\n| `gmv` | NUMERIC | Gross merchandise value booked for the order. |\n| `take_rate` | FLOAT | Platform's cut as a fraction of GMV (= category take_rate_pct / 100). |\n| `platform_revenue` | NUMERIC | Platform's recognised revenue (gmv × take_rate; zero if cancelled). |\n| `seller_payout` | NUMERIC | Seller's take-home (gmv − platform_revenue; zero if cancelled). |\n| `net_gmv` | NUMERIC | GMV net of cancellations (equal to gmv unless cancelled, then zero). |\n| `status` | STRING | Order status: pending, fulfilled or cancelled. |\n| `is_fulfilled` | BOOLEAN | Whether the order was fulfilled. |\n| `fulfillment_mins` | FLOAT | Order-to-fulfilment time in minutes — fill speed (null unless fulfilled). |\n\n## Joins\n\n- [Buyer](./buyer.md) — `buyer_id = buyer_id`\n- [Category](./category.md) — `category_id = category_id`\n- [Listings](./listings.md) — `listing_id = listing_id`\n- [Seller](./seller.md) — `seller_id = seller_id`\n", "marketplace/reviews": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Reviews\"\ndescription: \"One row per post-transaction review — rating, reviewer side and complaint flag.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-24T10:45:11.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `review_id` | STRING | PK. Unique review identifier. |\n| `order_id` | STRING | Order the review relates to (always a fulfilled order). FK to [Orders](./orders.md) |\n| `reviewer_role` | STRING | Side that left the review: buyer or seller. |\n| `rating` | INTEGER | Star rating 1–5 for the order. |\n| `created_at` | TIMESTAMP | When the review was submitted. |\n| `has_complaint` | BOOLEAN | Whether the review flags a complaint (concentrated in 1–2 star ratings). |\n\n## Joins\n\n- [Orders](./orders.md) — `order_id = order_id`\n", "marketplace/search-requests": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Search Requests\"\ndescription: \"One row per search/browse request — the demand and match-quality signal.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-24T10:45:11.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `request_id` | STRING | PK. Unique search request identifier. |\n| `buyer_id` | STRING | Buyer who made the search. FK to [Buyer](./buyer.md) |\n| `category_id` | STRING | Category the search was scoped to. FK to [Category](./category.md) |\n| `requested_at` | TIMESTAMP | When the search was made. |\n| `query` | STRING | Raw search text entered by the buyer. |\n| `results_count` | INTEGER | Number of results returned. |\n| `clicked` | BOOLEAN | Whether the buyer clicked a result. |\n| `converted` | BOOLEAN | Whether the search led to an order. |\n| `order_id` | STRING | Order the search converted into, if any. FK to [Orders](./orders.md) |\n| `time_to_match_mins` | FLOAT | Search → transaction latency in minutes (null unless converted). |\n\n## Joins\n\n- [Buyer](./buyer.md) — `buyer_id = buyer_id`\n- [Category](./category.md) — `category_id = category_id`\n- [Orders](./orders.md) — `order_id = order_id`\n", "marketplace/seller": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Seller\"\ndescription: \"The supply side — one row per seller, with rating, recency and lifecycle status.\"\ntags: [\"owox\"]\ntimestamp: 2026-07-24T10:45:14.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `seller_id` | STRING | PK. Unique seller identifier. |\n| `onboarded_at` | DATE | When the seller joined the platform. |\n| `category_id` | STRING | Primary category the seller sells in. FK to [Category](./category.md) |\n| `region` | STRING | Seller's geographic region. |\n| `rating` | FLOAT | Average buyer rating of the seller (null until first review). |\n| `active_listings` | INTEGER | Number of currently live listings. |\n| `is_activated` | BOOLEAN | Whether the seller has reached its first sale — supply activation. |\n| `fulfillment_type` | STRING | How the seller fulfils orders. |\n| `last_sale_at` | DATE | Date of the seller's most recent sale (null if never sold). |\n| `status` | STRING | Lifecycle state from sale recency: active, dormant or churned. |\n\n## Joins\n\n- [Category](./category.md) — `category_id = category_id`\n", "saas/account": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Account\"\ndescription: |\n  Every customer account (a company), with the signals that frame the whole relationship:\n  industry, size and region, the plan tier they are on, a revenue size band, the channel\n  that acquired them, their success-manager owner, a product-health score, and where they\n  sit in the lifecycle (trial, active, at-risk, churned). The dimension you slice the entire\n  business by.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:51:25.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `account_id` | STRING | PK. Unique account identifier. |\n| `name` | STRING | Company/account name. |\n| `industry` | STRING | Industry vertical of the account. |\n| `employee_band` | STRING | Company-size bucket by headcount. |\n| `plan_tier` | STRING | Subscription plan tier. |\n| `mrr_band` | STRING | Monthly-recurring-revenue size bucket. |\n| `region` | STRING | Sales/geographic region. |\n| `acquisition_channel` | STRING | Marketing channel that sourced the account — blended-CAC join key. |\n| `signup_date` | DATE | Date the account first signed up. |\n| `csm_owner` | STRING | Customer success manager who owns the account. |\n| `health_score` | INTEGER | 0–100 product-health composite. |\n| `lifecycle_stage` | STRING | trial / active / at-risk / churned. |\n\n# Example Questions\n\n- Which industries and company sizes carry the healthiest accounts and the highest revenue bands?\n- How does the mix of at-risk versus healthy accounts differ across acquisition channels?\n- Do accounts with a dedicated success manager show better health and lifecycle outcomes?\n", "saas/invoices": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Invoices\"\ndescription: |\n  Every invoice and how it was paid — amount, tax, discounts and credits, payment status, and\n  where it sits in the dunning cycle when a payment fails. This is where voluntary revenue meets\n  involuntary churn: failed payments and collections stages that quietly erode the customer base.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:51:26.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `invoice_id` | STRING | PK. Unique invoice identifier. |\n| `account_id` | STRING | Account billed. FK to [Account](./account.md) |\n| `subscription_id` | STRING | Subscription being billed. FK to [Subscription](./subscription.md) |\n| `issued_at` | DATE | Date the invoice was issued. |\n| `period_start` | DATE | Start of the billing period. |\n| `period_end` | DATE | End of the billing period. |\n| `amount` | NUMERIC | Invoice amount before tax. |\n| `tax` | NUMERIC | Tax charged on the invoice. |\n| `status` | STRING | Payment status of the invoice. |\n| `currency` | STRING | Invoice currency, aligned to the account's region. |\n| `discount_amount` | NUMERIC | Discount applied to the invoice, if any. |\n| `credit_applied` | NUMERIC | Account credit applied to the invoice, if any. |\n| `dunning_stage` | STRING | Collections stage: none / retry_1 / retry_2 / final_notice / write_off. |\n| `paid_at` | DATE | Date the invoice was paid. |\n| `is_failed` | BOOLEAN | Failed payment — involuntary-churn signal. |\n\n# Example Questions\n\n- How much revenue is lost to failed payments, and how much does dunning recover before write-off?\n- Which accounts are slipping through the collections stages toward involuntary churn?\n- How much do discounts and applied credits reduce collected revenue versus billed revenue?\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [Subscription](./subscription.md) — `subscription_id = subscription_id`\n", "saas/marketing-spend": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Marketing Spend\"\ndescription: |\n  Marketing investment by channel, campaign and day — cost, leads, and signups — attributed to\n  the cohort of accounts each channel brings in rather than to individual accounts. The numerator\n  and denominator of customer acquisition cost, and the starting point for payback analysis.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:51:25.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `spend_id` | STRING | PK. Unique identifier for each spend record. |\n| `spend_date` | DATE | Day the spend was incurred. |\n| `channel` | STRING | Acquisition channel the spend targeted — attributed to the cohort of accounts acquired through it, not to individual accounts. FK to [Account](./account.md) |\n| `campaign` | STRING | Campaign the spend belongs to. |\n| `cost` | NUMERIC | Money spent — the CAC numerator. |\n| `leads` | INTEGER | Leads generated by the spend. |\n| `signups` | INTEGER | Accounts created — CAC denominator. |\n\n# Example Questions\n\n- What is blended and per-channel acquisition cost, and which channels turn leads into signups most efficiently?\n- Which channels pay back fastest once their spend is set against the revenue their cohort retains?\n- How has cost per signup shifted over time as spend scaled up or down?\n\n## Joins\n\n- [Account](./account.md) — `channel = acquisition_channel`\n", "saas/plan": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Plan\"\ndescription: |\n  The price book: every sellable plan and price point — four tiers (Starter, Pro, Business,\n  Enterprise), each offered monthly or annually, with its list price and whether it is\n  currently sellable. The reference that gives every subscription its list pricing.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:51:26.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `plan_id` | STRING | PK. Unique plan/price-point identifier. |\n| `plan_name` | STRING | Human-readable plan name (tier + billing interval). |\n| `tier` | STRING | Product tier: Starter / Pro / Business / Enterprise. |\n| `billing_interval` | STRING | Billing cadence: monthly / annual. |\n| `list_price` | NUMERIC | Published list price for this plan at this interval. |\n| `currency` | STRING | Currency of the list price. |\n| `is_active` | BOOLEAN | Whether the plan is currently sellable. |\n\n# Example Questions\n\n- How does list pricing step up across tiers, and what is the effective saving for paying annually?\n- Which tiers and billing intervals are actually being sold the most?\n- How much revenue sits on plans that are no longer offered to new customers?\n", "saas/subscription-events": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Subscription Events\"\ndescription: |\n  The movement history behind recurring revenue: one row per subscription change — new,\n  expansion, contraction, reactivation, or churn — with the signed revenue and seat deltas\n  and the running revenue after each change. This is what reconstructs the revenue waterfall\n  and the retention rates the business lives or dies by.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:51:27.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `event_id` | STRING | PK. Unique subscription-event identifier. |\n| `account_id` | STRING | Account the event belongs to. FK to [Account](./account.md) |\n| `subscription_id` | STRING | Subscription the event belongs to. FK to [Subscription](./subscription.md) |\n| `event_ts` | TIMESTAMP | When the subscription change occurred. |\n| `event_type` | STRING | MRR-movement type: new / expansion / contraction / reactivation / churn. |\n| `plan_from` | STRING | Plan before the change. |\n| `plan_to` | STRING | Plan after the change. |\n| `mrr_delta` | NUMERIC | Signed MRR change — the MRR-movement waterfall. |\n| `seats_delta` | INTEGER | Signed change in seat count. |\n| `mrr_after` | NUMERIC | Total MRR after the change. |\n\n# Example Questions\n\n- What does the revenue waterfall look like month to month — how much new, expansion, contraction and churned revenue?\n- What are gross and net revenue retention, and which is trending the wrong way?\n- How much of expansion comes from seat growth versus tier upgrades?\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [Subscription](./subscription.md) — `subscription_id = subscription_id`\n", "saas/subscription": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Subscription\"\ndescription: |\n  The billing spine: one row per subscription showing which account is on which plan, at what\n  monthly recurring revenue and seat count, on what cadence, and with any negotiated discount.\n  It also reveals where a subscription's plan has drifted from the account's current tier under\n  grandfathered or discounted pricing. The source of truth for what each customer pays today.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:51:26.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `subscription_id` | STRING | PK. Unique subscription identifier. |\n| `account_id` | STRING | Account that owns the subscription. FK to [Account](./account.md) |\n| `plan_id` | STRING | Plan the subscription is billed on. May differ from the account's current tier under grandfathered pricing or a negotiated discount. FK to [Plan](./plan.md) |\n| `status` | STRING | Subscription status: trialing / active / past_due / canceled. |\n| `seats_licensed` | INTEGER | Number of seats licensed on the subscription. |\n| `mrr` | NUMERIC | Monthly recurring revenue for the subscription. |\n| `currency` | STRING | Billing currency, aligned to the account's region. |\n| `billing_interval` | STRING | Billing cadence: monthly / annual. |\n| `started_at` | DATE | Date the subscription started. |\n| `current_period_start` | DATE | Start of the current billing period. |\n| `current_period_end` | DATE | End of the current billing period. |\n| `canceled_at` | DATE | Date the subscription was canceled, if it was. |\n| `discount_pct` | NUMERIC | Negotiated discount fraction applied to list price, if any. |\n\n# Example Questions\n\n- What is total recurring revenue, and how is it spread across tiers, billing intervals and seat counts?\n- How common are negotiated discounts, and how much list price do they give away?\n- Which accounts sit on grandfathered pricing that no longer matches their current tier?\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [Plan](./plan.md) — `plan_id = plan_id`\n", "saas/support-tickets": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Support Tickets\"\ndescription: |\n  Every support interaction — priority, topic, satisfaction score, time to first response, and\n  resolution time. Support experience is an early churn-risk signal: unhappy, slow-to-resolve\n  accounts are the ones that quietly leave.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:51:28.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `ticket_id` | STRING | PK. Unique support-ticket identifier. |\n| `account_id` | STRING | Account that opened the ticket. FK to [Account](./account.md) |\n| `user_id` | STRING | User who opened the ticket, if attributable. FK to [User](./user.md) |\n| `opened_at` | TIMESTAMP | When the ticket was opened. |\n| `closed_at` | TIMESTAMP | When the ticket was closed. |\n| `priority` | STRING | Ticket priority level. |\n| `category` | STRING | Ticket topic/category. |\n| `csat_score` | INTEGER | Customer satisfaction rating for the ticket. |\n| `first_response_mins` | INTEGER | Minutes to first agent response. |\n\n# Example Questions\n\n- How do satisfaction scores and response times relate to whether an account later churns?\n- Which ticket categories drive the most dissatisfaction and the heaviest support load?\n- Do accounts that raise many high-priority tickets expand less than smoother ones?\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [User](./user.md) — `user_id = user_id`\n", "saas/trials": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Trials\"\ndescription: |\n  Every trial and how it ended — converted to paid or not — with when it started and expired,\n  where it came from (self-serve, sales-assisted, product-led upsell), and the plan it was\n  evaluating. The top of the funnel for new recurring revenue.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:51:27.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `trial_id` | STRING | PK. Unique trial identifier. |\n| `account_id` | STRING | Account running the trial. FK to [Account](./account.md) |\n| `started_at` | TIMESTAMP | When the trial began. |\n| `ends_at` | TIMESTAMP | Scheduled trial expiry. |\n| `converted_at` | TIMESTAMP | When the trial converted to a paid plan, if it did. |\n| `is_converted` | BOOLEAN | Trial-to-paid outcome flag. |\n| `trial_source` | STRING | Where the trial came from (self-serve, sales-assisted, PLG upsell). |\n| `requested_plan` | STRING | Plan tier the trial is evaluating. |\n\n# Example Questions\n\n- What is the trial-to-paid conversion rate, and how does it differ by trial source?\n- How long do trials take to convert, and does evaluating a higher tier change the odds?\n- Which trial sources bring in the accounts that go on to be worth the most?\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n", "saas/usage-daily": "---\ntype: \"OWOX Data Mart\"\ntitle: \"Usage (daily)\"\ndescription: |\n  Daily product engagement at the account-and-user level: active minutes, high-value actions\n  taken, and how many distinct features were touched — the breadth signal for activation. The\n  behavioral pulse that explains why accounts expand, stall, or churn.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:51:28.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `usage_id` | STRING | PK. Unique daily-usage record identifier. |\n| `account_id` | STRING | Account that generated the usage. FK to [Account](./account.md) |\n| `user_id` | STRING | User that generated the usage. FK to [User](./user.md) |\n| `usage_date` | DATE | Calendar day of the usage. |\n| `active_minutes` | INTEGER | Minutes the user was active in-product. |\n| `key_actions` | INTEGER | Count of high-value actions taken. |\n| `distinct_features_used` | INTEGER | Count of distinct product features touched that day — activation breadth. |\n\n# Example Questions\n\n- How does product engagement in the first weeks predict whether an account converts and expands?\n- Which accounts are quietly disengaging — falling active minutes or narrowing feature use — before they churn?\n- Does broader feature adoption go hand in hand with higher retention and revenue?\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n- [User](./user.md) — `user_id = user_id`\n", "saas/user": "---\ntype: \"OWOX Data Mart\"\ntitle: \"User\"\ndescription: |\n  The people inside each account: one row per user seat, with role, seat type, when they were\n  invited, and how recently they were active. Seat-level activity is what turns a licensed\n  account into an adopted one — and idle seats are early signs of shrinking value.\ntags: [\"owox\"]\ntimestamp: 2026-07-23T12:51:27.000Z\n---\n\n# Schema\n\n| Column | Type | Description |\n|--------|------|-------------|\n| `user_id` | STRING | PK. Unique user identifier. |\n| `account_id` | STRING | Owning account. FK to [Account](./account.md) |\n| `email` | STRING | User's email address. |\n| `role` | STRING | User's role within the account. |\n| `seat_type` | STRING | Type of seat assigned (e.g. full / viewer). |\n| `invited_at` | TIMESTAMP | When the user was invited. |\n| `last_active_at` | TIMESTAMP | Most recent activity timestamp. |\n| `is_active` | BOOLEAN | Whether the seat is currently active. |\n\n# Example Questions\n\n- What share of licensed seats is actually active, and how does seat adoption vary by account?\n- Which roles and seat types are the most engaged?\n- Are accounts with many dormant seats the ones heading toward contraction?\n\n## Joins\n\n- [Account](./account.md) — `account_id = account_id`\n"}, "types": ["Data Mart"]};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleNames = bundle.bundles || [];
  let currentBundle = bundleNames[0] || "";

  const bundleSelect = document.getElementById("bundle-select");
  for (const name of bundleNames) {
    const opt = document.createElement("option");
    opt.value = name; opt.textContent = name;
    bundleSelect.appendChild(opt);
  }
  bundleSelect.value = currentBundle;
  document.title = currentBundle + " — OKF Viewer";

  const inBundle = (el) => el.data.bundle === currentBundle;

  const typeSelect = document.getElementById("filter-type");

  function populateTypeFilter() {
    typeSelect.innerHTML = '<option value="">All types</option>';
    const types = new Set(bundle.nodes.filter(inBundle).map((n) => n.data.type));
    for (const t of [...types].sort()) {
      const opt = document.createElement("option");
      opt.value = t; opt.textContent = t;
      typeSelect.appendChild(opt);
    }
  }
  populateTypeFilter();

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] = backlinks[target] || []).push(source);
  }

  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes.filter(inBundle), ...bundle.edges.filter(inBundle)],
    style: [
      { selector: "node", style: {
          "background-color": "data(color)", "label": "data(label)",
          "color": "#0f172a", "font-size": 11,
          "text-valign": "bottom", "text-margin-y": 4,
          "text-wrap": "wrap", "text-max-width": 120,
          "width": "data(size)", "height": "data(size)",
          "border-width": 1, "border-color": "#0f172a" } },
      { selector: "node:selected", style: { "border-width": 3, "border-color": "#f59e0b" } },
      { selector: "edge", style: {
          "width": 1.5, "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1", "target-arrow-shape": "triangle",
          "curve-style": "bezier", "arrow-scale": 0.9 } },
      { selector: "edge:selected", style: {
          "line-color": "#f59e0b", "target-arrow-color": "#f59e0b", "width": 2.5 } },
      { selector: ".dim", style: { "opacity": 0.15 } },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => { if (evt.target === cy) clearSelection(); });

  bundleSelect.addEventListener("change", (e) => {
    currentBundle = e.target.value;
    document.title = currentBundle + " — OKF Viewer";
    document.getElementById("search").value = "";
    clearSelection();
    cy.elements().remove();
    cy.add([...bundle.nodes.filter(inBundle), ...bundle.edges.filter(inBundle)]);
    cy.elements().removeClass("dim");
    populateTypeFilter();
    cy.layout({ name: document.getElementById("layout").value, animate: false, padding: 30 }).run();
    cy.fit(null, 30);
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });
  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30); clearSelection();
  });
  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay = (d.label || "").toLowerCase() + " " + d.id.toLowerCase() + " " + (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((e) => {
      e.toggleClass("dim", e.source().hasClass("dim") || e.target().hasClass("dim"));
    });
  });
  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) { cy.elements().removeClass("dim"); return; }
    cy.nodes().forEach((n) => n.toggleClass("dim", n.data("type") !== t));
    cy.edges().forEach((e) => {
      e.toggleClass("dim", e.source().hasClass("dim") || e.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail-content").hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type; chip.style.background = data.color;
    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource; a.textContent = data.resource;
      a.target = "_blank"; a.rel = "noopener"; a.className = "external";
      resourceEl.appendChild(a);
    } else { resourceEl.textContent = "—"; }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    for (const t of (data.tags || [])) {
      const span = document.createElement("span");
      span.className = "tag"; span.textContent = t; tagsEl.appendChild(span);
    }
    if (!data.tags || !data.tags.length) tagsEl.textContent = "—";

    document.getElementById("detail-body").innerHTML =
      marked.parse(bundle.bodies[conceptId] || "", { breaks: false, gfm: true });

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    blSection.hidden = !bl.length;
    for (const src of bl) {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.textContent = nodeIndex[src] ? nodeIndex[src].label : src;
      a.onclick = () => showDetail(src);
      li.appendChild(a); blList.appendChild(li);
    }
  }
})();
</script>
</body>
</html>
